<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake</title>
    <style>
        * { user-select: none; }
        body {
            background: #c0c0c0;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .game-container {
            background: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 15px;
            text-align: center;
        }
        canvas {
            background: #000;
            display: block;
            margin: 10px auto;
            border: 2px solid #808080;
        }
        .score {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
            background: #000;
            color: #0f0;
            padding: 5px 15px;
            display: inline-block;
            font-family: monospace;
        }
        .retro-button {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            margin: 5px;
        }
        .retro-button:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        .controls {
            margin-top: 10px;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h2>🐍 SNAKE</h2>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div>
        <span class="score">Score: <span id="score">0</span></span>
    </div>
    <button class="retro-button" id="startBtn">▶ Start Game</button>
    <button class="retro-button" id="pauseBtn">⏸ Pause</button>
    <div class="controls">
        ← ↑ ↓ → or WASD
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    
    let snake = [{x: 10, y: 10}];
    let direction = {x: 0, y: 0};
    let food = {};
    let score = 0;
    let gameRunning = false;
    let gameLoop = null;
    let paused = false;
    
    function randomFood() {
        food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };
        // Check if food spawns on snake
        for (let segment of snake) {
            if (segment.x === food.x && segment.y === food.y) {
                randomFood();
                break;
            }
        }
    }
    
    function draw() {
        // Clear canvas
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw snake
        ctx.fillStyle = '#00ff00';
        for (let i = 0; i < snake.length; i++) {
            ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
            // Draw head different color
            if (i === 0) {
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
                ctx.fillStyle = '#00ff00';
            }
        }
        
        // Draw food
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        
        // Draw grid
        ctx.strokeStyle = '#333';
        for (let i = 0; i < tileCount; i++) {
            ctx.beginPath();
            ctx.moveTo(i * gridSize, 0);
            ctx.lineTo(i * gridSize, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * gridSize);
            ctx.lineTo(canvas.width, i * gridSize);
            ctx.stroke();
        }
    }
    
    function update() {
        if (!gameRunning || paused) return;
        
        const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
        
        // Wall collision
        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
            gameOver();
            return;
        }
        
        // Self collision
        for (let segment of snake) {
            if (head.x === segment.x && head.y === segment.y) {
                gameOver();
                return;
            }
        }
        
        snake.unshift(head);
        
        // Food collision
        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreElement.textContent = score;
            randomFood();
        } else {
            snake.pop();
        }
        
        draw();
    }
    
    function gameOver() {
        gameRunning = false;
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = null;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = '20px "MS Sans Serif"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER!', canvas.width/2, canvas.height/2);
        ctx.font = '12px "MS Sans Serif"';
        ctx.fillText('Click Start to play again', canvas.width/2, canvas.height/2 + 30);
    }
    
    function startGame() {
        if (gameLoop) clearInterval(gameLoop);
        snake = [{x: 10, y: 10}];
        direction = {x: 0, y: 0};
        score = 0;
        scoreElement.textContent = score;
        gameRunning = true;
        paused = false;
        randomFood();
        draw();
        gameLoop = setInterval(update, 100);
    }
    
    function pauseGame() {
        if (!gameRunning) return;
        paused = !paused;
        if (!paused) {
            draw();
        } else {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '20px "MS Sans Serif"';
            ctx.textAlign = 'center';
            ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
        }
    }
    
    document.getElementById('startBtn').onclick = startGame;
    document.getElementById('pauseBtn').onclick = pauseGame;
    
    document.addEventListener('keydown', (e) => {
        if (!gameRunning || paused) return;
        
        switch(e.key) {
            case 'ArrowUp': case 'w':
                if (direction.y === 0) { direction = {x: 0, y: -1}; }
                break;
            case 'ArrowDown': case 's':
                if (direction.y === 0) { direction = {x: 0, y: 1}; }
                break;
            case 'ArrowLeft': case 'a':
                if (direction.x === 0) { direction = {x: -1, y: 0}; }
                break;
            case 'ArrowRight': case 'd':
                if (direction.x === 0) { direction = {x: 1, y: 0}; }
                break;
        }
    });
    
    // Draw initial screen
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '16px "MS Sans Serif"';
    ctx.textAlign = 'center';
    ctx.fillText('Click Start to play', canvas.width/2, canvas.height/2);
</script>
</body>
</html>
