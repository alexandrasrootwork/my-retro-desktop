<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💣 Minesweeper</title>
    <style>
        * { user-select: none; }
        body {
            background: #c0c0c0;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .game-container {
            background: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 15px;
            display: inline-block;
        }
        .game-header {
            background: #c0c0c0;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #808080;
        }
        .mine-counter, .smiley {
            background: #000;
            color: #f00;
            font-family: monospace;
            font-size: 24px;
            padding: 5px 10px;
            letter-spacing: 2px;
        }
        .smiley {
            background: #c0c0c0;
            color: #000;
            font-size: 28px;
            cursor: pointer;
            padding: 0 10px;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
        }
        .smiley:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        .board {
            display: grid;
            gap: 1px;
            background: #808080;
            padding: 2px;
        }
        .cell {
            width: 32px;
            height: 32px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            text-align: center;
            line-height: 32px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .cell.revealed {
            background: #fff;
            border: 1px solid #808080;
            line-height: 30px;
        }
        .cell.flagged::before {
            content: "🚩";
        }
        .retro-button {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 10px;
            width: 100%;
        }
        .retro-button:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div class="mine-counter" id="mineCounter">000</div>
        <div class="smiley" id="smiley">🙂</div>
        <div class="mine-counter" id="timer">000</div>
    </div>
    <div id="board" class="board"></div>
    <button class="retro-button" onclick="initGame()">🔄 New Game</button>
</div>

<script>
    const size = 9;
    const totalMines = 10;
    let board = [];
    let gameActive = true;
    let firstMove = true;
    let flagsPlaced = 0;
    let timer = 0;
    let timerInterval = null;

    function initGame() {
        if (timerInterval) clearInterval(timerInterval);
        timer = 0;
        updateTimer();
        gameActive = true;
        firstMove = true;
        flagsPlaced = 0;
        updateMineCounter();
        document.getElementById('smiley').textContent = '🙂';
        board = Array(size).fill().map(() => Array(size).fill().map(() => ({
            revealed: false,
            mine: false,
            flagged: false,
            neighbor: 0
        })));
        render();
    }

    function placeMines(firstX, firstY) {
        let placed = 0;
        while (placed < totalMines) {
            const x = Math.floor(Math.random() * size);
            const y = Math.floor(Math.random() * size);
            if (!board[x][y].mine && (Math.abs(x - firstX) > 1 || Math.abs(y - firstY) > 1)) {
                board[x][y].mine = true;
                placed++;
            }
        }
        calculateNeighbors();
    }

    function calculateNeighbors() {
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (!board[i][j].mine) {
                    board[i][j].neighbor = getNeighborMines(i, j);
                }
            }
        }
    }

    function getNeighborMines(x, y) {
        let count = 0;
        for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                if (x + i >= 0 && x + i < size && y + j >= 0 && y + j < size && board[x + i][y + j].mine) {
                    count++;
                }
            }
        }
        return count;
    }

    function reveal(x, y) {
        if (!gameActive || board[x][y].revealed || board[x][y].flagged) return;

        if (firstMove) {
            firstMove = false;
            placeMines(x, y);
            startTimer();
        }

        board[x][y].revealed = true;

        if (board[x][y].mine) {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('smiley').textContent = '💀';
            revealAllMines();
            render();
            alert('💥 Game Over! You hit a mine!');
            return;
        }

        if (board[x][y].neighbor === 0) {
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    if (x + i >= 0 && x + i < size && y + j >= 0 && y + j < size) {
                        reveal(x + i, y + j);
                    }
                }
            }
        }

        render();
        checkWin();
    }

    function revealAllMines() {
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (board[i][j].mine) {
                    board[i][j].revealed = true;
                }
            }
        }
    }

    function toggleFlag(x, y) {
        if (!gameActive || board[x][y].revealed) return;

        if (!board[x][y].flagged && flagsPlaced < totalMines) {
            board[x][y].flagged = true;
            flagsPlaced++;
        } else if (board[x][y].flagged) {
            board[x][y].flagged = false;
            flagsPlaced--;
        }
        updateMineCounter();
        render();
        checkWin();
    }

    function checkWin() {
        let revealedCount = 0;
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                if (board[i][j].revealed && !board[i][j].mine) revealedCount++;
            }
        }
        if (revealedCount === size * size - totalMines) {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('smiley').textContent = '😎';
            alert('🎉 YOU WIN! 🎉');
        }
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameActive) {
                timer++;
                updateTimer();
            }
        }, 1000);
    }

    function updateMineCounter() {
        const remaining = totalMines - flagsPlaced;
        document.getElementById('mineCounter').textContent = String(remaining).padStart(3, '0');
    }

    function updateTimer() {
        document.getElementById('timer').textContent = String(timer).padStart(3, '0');
    }

    function render() {
        const container = document.getElementById('board');
        container.style.gridTemplateColumns = `repeat(${size}, 32px)`;
        container.innerHTML = '';
        
        for (let i = 0; i < size; i++) {
            for (let j = 0; j < size; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (board[i][j].revealed) {
                    cell.classList.add('revealed');
                    if (board[i][j].mine) {
                        cell.textContent = '💣';
                    } else if (board[i][j].neighbor > 0) {
                        cell.textContent = board[i][j].neighbor;
                        // Color code numbers
                        const colors = ['', '#0000ff', '#008000', '#ff0000', '#000080', '#800000', '#008080', '#000000', '#808080'];
                        cell.style.color = colors[board[i][j].neighbor] || '#000';
                    }
                } else if (board[i][j].flagged) {
                    cell.textContent = '🚩';
                }
                
                cell.onclick = () => reveal(i, j);
                cell.oncontextmenu = (e) => {
                    e.preventDefault();
                    toggleFlag(i, j);
                    return false;
                };
                container.appendChild(cell);
            }
        }
    }

    initGame();
</script>
</body>
</html>
