<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💣 Minesweeper</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            text-align: center;
            background: #c0c0c0;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Windows 95 style window frame */
        .window-frame {
            background: #c0c0c0;
            border: 3px solid;
            border-color: #fff #808080 #808080 #fff;
            display: inline-block;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        
        /* Custom title bar */
        .title-bar-custom {
            background: #000080;
            color: white;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            border-bottom: 1px solid #808080;
        }
        
        .title-bar-custom:active {
            cursor: grabbing;
        }
        
        .close-btn-custom {
            background: #c0c0c0;
            border: 1px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            width: 20px;
            height: 18px;
            text-align: center;
            line-height: 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: normal;
            color: #000;
        }
        
        .close-btn-custom:active {
            border: 1px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        .game-content {
            padding: 6px;
        }
        
        .game {
            display: inline-block;
            background: #c0c0c3;
            padding: 4px;
        }
        
        /* Outset border */
        .game,
        #grid button,
        #smiley {
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
        }
        
        /* Inset border */
        .nav,
        #grid,
        #smiley:active {
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
        }
        
        /* Mobile Controls Bar */
        .mobile-controls {
            display: none;
            margin-bottom: 5px;
            justify-content: center;
            gap: 6px;
        }
        
        .mode-btn {
            background: #c0c0c3;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 4px 8px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .mode-btn.active {
            background: #000080;
            color: white;
            border-color: #808080 #fff #fff #808080;
        }
        
        .mode-btn:active {
            border-color: #808080 #fff #fff #808080;
        }
        
        @media (max-width: 768px), (pointer: coarse) {
            .mobile-controls {
                display: flex;
            }
        }
        
        .difficulty-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 5px;
            justify-content: center;
            background: #c0c0c3;
            padding: 2px;
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
        }
        
        .difficulty-btn {
            background: #c0c0c3;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 3px 6px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            font-weight: bold;
        }
        
        .difficulty-btn:active {
            border-color: #808080 #fff #fff #808080;
        }
        
        .difficulty-btn.active {
            background: #000080;
            color: white;
            border-color: #808080 #fff #fff #808080;
        }
        
        .nav {
            display: flex;
            margin-bottom: 5px;
            padding: 2px;
            justify-content: space-between;
            gap: 8px;
        }
        
        #mines-left,
        #timer {
            display: flex;
            align-items: center;
            color: #ea3323;
            background: #000;
            padding: 3px 6px;
            font-size: 16px;
            font-family: monospace;
        }
        
        #smiley {
            display: block;
            padding: 0;
            width: 34px;
            height: 34px;
            font-size: 20px;
            background: inherit;
            cursor: pointer;
            line-height: 30px;
        }
        
        #smiley::after {
            content: '🙂';
        }
        
        #smiley.lost::after {
            content: '😵‍💫';
        }
        
        #smiley.won::after {
            content: '😎';
        }
        
        #grid {
            display: inline-grid;
            user-select: none;
        }
        
        #grid button {
            display: block;
            padding: 0;
            width: 26px;
            height: 26px;
            font-family: inherit;
            font-size: 14px;
            background: inherit;
            cursor: pointer;
        }
        
        #grid button:active {
            border-color: #808080 #fff #fff #808080;
        }
        
        #grid button:disabled {
            background: #c0c0c3;
            border: 1px solid #808080;
            border-bottom: none;
            border-right: none;
            color: inherit;
        }
        
        #grid button:disabled.exploded {
            background: #ea3323;
        }
        
        #grid button.flagged::after {
            content: '🚩';
            font-size: 12px;
        }
        
        #grid button.mine::after {
            content: '💣';
            font-size: 12px;
        }
        
        #grid button.value-1 { color: #0100f3; }
        #grid button.value-2 { color: #367c21; }
        #grid button.value-3 { color: #e93323; }
        #grid button.value-4 { color: #020079; }
        #grid button.value-5 { color: #78150e; }
        #grid button.value-6 { color: #387e7e; }
        #grid button.value-7 { color: #000000; }
        #grid button.value-8 { color: #808080; }
        
        .directions-panel {
            background: #c0c0c3;
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
            padding: 3px 4px;
            margin-top: 5px;
            font-size: 7px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
        }
        
        .direction-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        /* Modal Dialog */
        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .game-message {
            background: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            min-width: 220px;
            text-align: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            font-family: 'Press Start 2P', monospace;
        }
        
        .game-message .title-bar {
            background: #000080;
            color: white;
            padding: 6px 8px;
            font-size: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0;
            cursor: move;
        }
        
        .game-message .close-btn {
            background: #c0c0c0;
            border: 1px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            width: 20px;
            height: 18px;
            text-align: center;
            line-height: 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: normal;
        }
        
        .game-message .close-btn:active {
            border: 1px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        .game-message .message-content {
            padding: 20px 30px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
        }
        
        .game-message .message-content button {
            margin-top: 15px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
        }
        
        .game-message .message-content button:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
    </style>
</head>
<body>
<div class="window-frame">
    <div class="title-bar-custom" id="titleBar">
        <span>💣 MINESWEEPER</span>
        <div><span class="close-btn-custom" id="closeBtnPopup">✗</span></div>
    </div>
    <div class="game-content">
        <div class="game">
            <!-- Mobile Controls -->
            <div class="mobile-controls">
                <button class="mode-btn" id="revealModeBtn">🔍 REVEAL</button>
                <button class="mode-btn" id="flagModeBtn">🚩 FLAG</button>
            </div>
            
            <div class="difficulty-bar">
                <button class="difficulty-btn" data-difficulty="easy">EASY</button>
                <button class="difficulty-btn" data-difficulty="medium">MED</button>
                <button class="difficulty-btn" data-difficulty="hard">HARD</button>
                <button class="difficulty-btn" data-difficulty="extreme">EXT</button>
            </div>
            
            <div class="nav">
                <div id="mines-left">000</div>
                <button id="smiley"></button>
                <div id="timer">000</div>
            </div>
            
            <div id="grid"></div>
            
            <!-- Directions Panel -->
            <div class="directions-panel">
                <div class="direction-item"><span>💣</span><span>REVEAL</span></div>
                <div class="direction-item"><span>🚩</span><span>FLAG</span></div>
                <div class="direction-item"><span>🔄</span><span>SMILEY</span></div>
                <div class="direction-item"><span>📱</span><span>REVEAL/FLAG MODES</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    const DIFFICULTIES = {
        easy: { width: 9, height: 9, mines: 10 },
        medium: { width: 16, height: 16, mines: 40 },
        hard: { width: 16, height: 30, mines: 99 },
        extreme: { width: 20, height: 30, mines: 160 }
    };
    
    let currentDifficulty = 'easy';
    let board = [];
    let gameActive = true;
    let firstMove = true;
    let flagsPlaced = 0;
    let timer = 0;
    let timerInterval = null;
    let currentMines = 10;
    let currentWidth = 9;
    let currentHeight = 9;
    let mobileMode = 'reveal';
    let currentOverlay = null;
    
    function resizeWindow() {
        const config = DIFFICULTIES[currentDifficulty];
        const boardWidth = config.width * 26;
        const boardHeight = config.height * 26;
        const contentWidth = boardWidth + 18;
        const contentHeight = boardHeight + 130;
        
        window.resizeTo(contentWidth, contentHeight);
        window.moveTo(
            (screen.width - contentWidth) / 2,
            (screen.height - contentHeight) / 2
        );
    }
    
    function closeOverlay() {
        if (currentOverlay) {
            currentOverlay.remove();
            currentOverlay = null;
        }
    }
    
    function showGameOverMessage(msg) {
        closeOverlay();
        const overlay = document.createElement('div');
        overlay.className = 'game-overlay';
        overlay.innerHTML = `
            <div class="game-message">
                <div class="title-bar">
                    <span>💀 GAME OVER</span>
                    <div><span class="close-btn" id="closeMessageBtn">✗</span></div>
                </div>
                <div class="message-content">
                    ${msg}<br>
                    <button id="newGameBtn">🔄 NEW GAME</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        currentOverlay = overlay;
        
        document.getElementById('closeMessageBtn').onclick = () => closeOverlay();
        document.getElementById('newGameBtn').onclick = () => {
            closeOverlay();
            initGame();
        };
    }
    
    function showWinMessage(msg) {
        closeOverlay();
        const overlay = document.createElement('div');
        overlay.className = 'game-overlay';
        overlay.innerHTML = `
            <div class="game-message">
                <div class="title-bar">
                    <span>🎉 VICTORY!</span>
                    <div><span class="close-btn" id="closeMessageBtn">✗</span></div>
                </div>
                <div class="message-content">
                    ${msg}<br>
                    <button id="newGameBtn">🔄 NEW GAME</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        currentOverlay = overlay;
        
        document.getElementById('closeMessageBtn').onclick = () => closeOverlay();
        document.getElementById('newGameBtn').onclick = () => {
            closeOverlay();
            initGame();
        };
    }
    
    function initGame() {
        closeOverlay();
        if (timerInterval) clearInterval(timerInterval);
        timer = 0;
        updateTimer();
        gameActive = true;
        firstMove = true;
        flagsPlaced = 0;
        
        const config = DIFFICULTIES[currentDifficulty];
        currentMines = config.mines;
        currentWidth = config.width;
        currentHeight = config.height;
        
        updateMineCounter();
        document.getElementById('smiley').className = '';
        
        board = Array(currentHeight).fill().map(() => Array(currentWidth).fill().map(() => ({
            revealed: false,
            mine: false,
            flagged: false,
            neighbor: 0
        })));
        
        render();
        resizeWindow();
    }
    
    function placeMines(firstX, firstY) {
        let placed = 0;
        while (placed < currentMines) {
            const x = Math.floor(Math.random() * currentWidth);
            const y = Math.floor(Math.random() * currentHeight);
            const isFirstCell = (x === firstX && y === firstY);
            const isAdjacent = Math.abs(x - firstX) <= 1 && Math.abs(y - firstY) <= 1;
            if (!board[y][x].mine && !isFirstCell && !isAdjacent) {
                board[y][x].mine = true;
                placed++;
            }
        }
        calculateNeighbors();
    }
    
    function calculateNeighbors() {
        for (let y = 0; y < currentHeight; y++) {
            for (let x = 0; x < currentWidth; x++) {
                if (!board[y][x].mine) {
                    board[y][x].neighbor = getNeighborMines(x, y);
                }
            }
        }
    }
    
    function getNeighborMines(x, y) {
        let count = 0;
        for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                const newX = x + i;
                const newY = y + j;
                if (newX >= 0 && newX < currentWidth && newY >= 0 && newY < currentHeight && board[newY][newX].mine) {
                    count++;
                }
            }
        }
        return count;
    }
    
    function reveal(x, y) {
        if (!gameActive || board[y][x].revealed || board[y][x].flagged) return;
        
        if (firstMove) {
            firstMove = false;
            placeMines(x, y);
            startTimer();
        }
        
        board[y][x].revealed = true;
        
        if (board[y][x].mine) {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('smiley').className = 'lost';
            revealAllMines();
            render();
            showGameOverMessage('💥 GAME OVER! 💥');
            return;
        }
        
        if (board[y][x].neighbor === 0) {
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    const newX = x + i;
                    const newY = y + j;
                    if (newX >= 0 && newX < currentWidth && newY >= 0 && newY < currentHeight) {
                        reveal(newX, newY);
                    }
                }
            }
        }
        
        render();
        checkWin();
    }
    
    function revealAllMines() {
        for (let y = 0; y < currentHeight; y++) {
            for (let x = 0; x < currentWidth; x++) {
                if (board[y][x].mine) {
                    board[y][x].revealed = true;
                }
            }
        }
    }
    
    function toggleFlag(x, y) {
        if (!gameActive || board[y][x].revealed) return;
        
        if (!board[y][x].flagged && flagsPlaced < currentMines) {
            board[y][x].flagged = true;
            flagsPlaced++;
        } else if (board[y][x].flagged) {
            board[y][x].flagged = false;
            flagsPlaced--;
        }
        updateMineCounter();
        render();
        checkWin();
    }
    
    function checkWin() {
        let correctlyRevealed = 0;
        for (let y = 0; y < currentHeight; y++) {
            for (let x = 0; x < currentWidth; x++) {
                if (board[y][x].revealed && !board[y][x].mine) correctlyRevealed++;
            }
        }
        
        const totalSafeCells = currentWidth * currentHeight - currentMines;
        if (correctlyRevealed === totalSafeCells) {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('smiley').className = 'won';
            showWinMessage('🎉 YOU WIN! 🎉');
        }
    }
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameActive) {
                timer++;
                updateTimer();
            }
        }, 1000);
    }
    
    function updateMineCounter() {
        const remaining = currentMines - flagsPlaced;
        document.getElementById('mines-left').textContent = String(remaining).padStart(3, '0');
    }
    
    function updateTimer() {
        document.getElementById('timer').textContent = String(timer).padStart(3, '0');
    }
    
    function handleCellInteraction(x, y) {
        if (mobileMode === 'reveal') {
            reveal(x, y);
        } else {
            toggleFlag(x, y);
        }
    }
    
    function render() {
        const container = document.getElementById('grid');
        container.style.gridTemplateColumns = `repeat(${currentWidth}, 26px)`;
        container.innerHTML = '';
        
        for (let y = 0; y < currentHeight; y++) {
            for (let x = 0; x < currentWidth; x++) {
                const button = document.createElement('button');
                
                if (board[y][x].revealed) {
                    button.disabled = true;
                    if (board[y][x].mine) {
                        button.className = 'mine';
                    } else if (board[y][x].neighbor > 0) {
                        button.className = `value-${board[y][x].neighbor}`;
                        button.textContent = board[y][x].neighbor;
                    }
                } else if (board[y][x].flagged) {
                    button.className = 'flagged';
                }
                
                button.onclick = (e) => {
                    e.preventDefault();
                    handleCellInteraction(x, y);
                };
                
                button.oncontextmenu = (e) => {
                    e.preventDefault();
                    toggleFlag(x, y);
                    return false;
                };
                
                container.appendChild(button);
            }
        }
    }
    
    function changeDifficulty(difficulty) {
        closeOverlay();
        currentDifficulty = difficulty;
        
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            if (btn.dataset.difficulty === difficulty) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        initGame();
    }
    
    function setMobileMode(mode) {
        mobileMode = mode;
        const revealBtn = document.getElementById('revealModeBtn');
        const flagBtn = document.getElementById('flagModeBtn');
        
        if (mode === 'reveal') {
            revealBtn.classList.add('active');
            flagBtn.classList.remove('active');
        } else {
            revealBtn.classList.remove('active');
            flagBtn.classList.add('active');
        }
    }
    
    // Make title bar draggable
    function makeDraggable() {
        const titleBar = document.getElementById('titleBar');
        let isDragging = false;
        let offsetX, offsetY;
        
        titleBar.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('close-btn-custom')) return;
            isDragging = true;
            offsetX = e.clientX - window.screenX;
            offsetY = e.clientY - window.screenY;
            titleBar.style.cursor = 'grabbing';
        });
        
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                window.moveTo(e.clientX - offsetX, e.clientY - offsetY);
            }
        });
        
        document.addEventListener('mouseup', () => {
            isDragging = false;
            titleBar.style.cursor = '';
        });
    }
    
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            changeDifficulty(btn.dataset.difficulty);
        });
    });
    
    const revealModeBtn = document.getElementById('revealModeBtn');
    const flagModeBtn = document.getElementById('flagModeBtn');
    
    if (revealModeBtn && flagModeBtn) {
        revealModeBtn.addEventListener('click', () => setMobileMode('reveal'));
        flagModeBtn.addEventListener('click', () => setMobileMode('flag'));
        setMobileMode('reveal');
    }
    
    document.getElementById('smiley').onclick = () => {
        closeOverlay();
        initGame();
    };
    
    document.getElementById('closeBtnPopup').onclick = () => {
        window.close();
    };
    
    document.querySelector('.difficulty-btn[data-difficulty="easy"]').classList.add('active');
    
    makeDraggable();
    initGame();
</script>
</body>
</html>
