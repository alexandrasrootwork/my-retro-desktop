<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Walkman Pro - Music Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #c0c0c0;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #2a2a2a;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 6px 6px 0px #1a1a1a;
        }
        /* Header / Title Bar */
        .title-bar {
            background: #000080;
            color: white;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px 8px 0 0;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        /* Main Layout - 3 Columns */
        .main-layout {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .sidebar {
            width: 260px;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 12px;
            flex-shrink: 0;
        }
        .library-view {
            flex: 1;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 12px;
            min-width: 250px;
        }
        .player-panel {
            width: 320px;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 12px;
            flex-shrink: 0;
        }
        /* Navigation */
        .nav-section {
            margin-bottom: 20px;
        }
        .nav-title {
            color: #aaa;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            border-left: 2px solid #2d5a2d;
            padding-left: 8px;
        }
        .nav-item {
            padding: 6px 10px;
            margin: 2px 0;
            cursor: pointer;
            border-radius: 6px;
            color: #ccc;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-item:hover { background: #333; }
        .nav-item.active { background: #2d5a2d; color: white; }
        /* Playlist Create */
        .create-playlist {
            margin-top: 16px;
            display: flex;
            gap: 6px;
        }
        .create-playlist input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 6px;
            border-radius: 4px;
            font-size: 10px;
        }
        .retro-btn {
            background: #2a4a6e;
            border: none;
            padding: 6px 10px;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-size: 10px;
            font-family: monospace;
        }
        .retro-btn.success { background: #2d5a2d; }
        .retro-btn.danger { background: #8b0000; }
        .retro-btn.warning { background: #b8860b; }
        /* Search Bar */
        .search-bar {
            margin-bottom: 12px;
        }
        .search-bar input {
            width: 100%;
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
        }
        /* Song/File Grid */
        .items-grid {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 400px;
            overflow-y: auto;
        }
        .song-item, .folder-item {
            background: #2a2a2a;
            padding: 10px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .song-item:hover, .folder-item:hover { background: #3a3a3a; transform: translateX(2px); }
        .song-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }
        .song-title { color: #ddd; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-meta { color: #888; font-size: 9px; display: flex; gap: 12px; }
        .song-actions { display: flex; gap: 6px; align-items: center; }
        .favorite-star { font-size: 14px; cursor: pointer; color: #ffaa00; text-shadow: 0 0 2px #ffaa00; }
        .favorite-star.inactive { color: #666; text-shadow: none; }
        /* Now Playing */
        .now-playing-card {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            text-align: center;
        }
        .cover-art {
            width: 80px;
            height: 80px;
            background: #1a3a1a;
            border-radius: 8px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .song-title-playing { color: #0f0; font-size: 13px; font-weight: bold; margin: 6px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { color: #888; font-size: 10px; margin-bottom: 12px; }
        .progress-bar-big {
            width: 100%;
            height: 4px;
            background: #444;
            border-radius: 2px;
            margin: 10px 0;
            cursor: pointer;
        }
        .progress-fill-big {
            height: 100%;
            background: #0f0;
            border-radius: 2px;
            width: 0%;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #0f0;
            font-family: monospace;
        }
        .player-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
        }
        .player-btn {
            background: #333;
            border: none;
            color: white;
            font-size: 16px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .player-btn.play { background: #2d5a2d; padding: 8px 20px; }
        .volume-slider {
            width: 100%;
            margin-top: 8px;
        }
        /* Album View */
        .album-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .album-card {
            background: #2a2a2a;
            width: 100px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
        }
        .album-art { font-size: 40px; }
        .album-name { font-size: 10px; color: #ddd; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* Folder Browser */
        .breadcrumb {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            font-size: 10px;
            color: #aaa;
        }
        .breadcrumb span { cursor: pointer; color: #2a4a6e; }
        /* Tabs inside library */
        .view-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            border-bottom: 1px solid #444;
        }
        .view-tab {
            padding: 6px 12px;
            cursor: pointer;
            font-size: 11px;
            color: #aaa;
        }
        .view-tab.active { color: #0f0; border-bottom: 2px solid #0f0; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        @media (max-width: 900px) {
            .sidebar { width: 200px; }
            .player-panel { width: 280px; }
        }
        @media (max-width: 700px) {
            .main-layout { flex-direction: column; }
            .sidebar, .library-view, .player-panel { width: 100%; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="title-bar">
        <span>📼 WALKMAN PRO — Music Library</span>
        <span id="connectionIndicator">⚫ Not connected</span>
    </div>

    <div class="main-layout">
        <!-- LEFT SIDEBAR - Navigation -->
        <div class="sidebar">
            <div class="nav-section">
                <div class="nav-title">LIBRARY</div>
                <div class="nav-item" data-view="songs">🎵 All Songs</div>
                <div class="nav-item" data-view="albums">💿 Albums</div>
                <div class="nav-item" data-view="folders">📁 Folders</div>
                <div class="nav-item" data-view="favorites">❤️ Favorites</div>
            </div>
            <div class="nav-section">
                <div class="nav-title">MY PLAYLISTS</div>
                <div id="playlistList"></div>
                <div class="create-playlist">
                    <input type="text" id="newPlaylistName" placeholder="New playlist name">
                    <button id="createPlaylistBtn" class="retro-btn">+</button>
                </div>
            </div>
            <div class="nav-section">
                <div class="nav-title">GITHUB SETUP</div>
                <input type="text" id="githubRepoInput" placeholder="username/repo" style="width:100%; margin-bottom:6px; background:#333; border:1px solid #555; color:white; padding:5px; border-radius:4px;">
                <input type="text" id="githubFolderInput" placeholder="Music folder (e.g., Music)" value="Music" style="width:100%; margin-bottom:6px; background:#333; border:1px solid #555; color:white; padding:5px; border-radius:4px;">
                <input type="password" id="githubTokenInput" placeholder="GitHub Token (for uploads)" style="width:100%; margin-bottom:6px; background:#333; border:1px solid #555; color:white; padding:5px; border-radius:4px;">
                <button id="connectGithubBtn" class="retro-btn success" style="width:100%;">🔌 Connect & Scan</button>
                <button id="uploadFolderBtn" class="retro-btn" style="width:100%; margin-top:6px;">📁 Upload MP3s</button>
                <div id="uploadProgress" style="margin-top:6px; font-size:9px; color:#aaa;"></div>
            </div>
        </div>

        <!-- CENTER - Library View -->
        <div class="library-view">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search songs, artists, albums...">
            </div>
            <div class="view-tabs" id="viewTabs" style="display:none;">
                <div class="view-tab active" data-subview="list">📋 List</div>
                <div class="view-tab" data-subview="grid">🎨 Grid</div>
            </div>
            <div id="libraryContent">Loading...</div>
        </div>

        <!-- RIGHT - Player Panel -->
        <div class="player-panel">
            <div class="now-playing-card">
                <div class="cover-art">🎵</div>
                <div class="song-title-playing" id="nowPlayingTitle">No song playing</div>
                <div class="artist-name" id="nowPlayingArtist">—</div>
                <div class="progress-bar-big" id="progressBarBig">
                    <div class="progress-fill-big" id="progressFillBig"></div>
                </div>
                <div class="time-row">
                    <span id="currentTimeDisplay">0:00</span>
                    <span id="totalTimeDisplay">0:00</span>
                </div>
                <div class="player-buttons">
                    <button class="player-btn" id="prevBtnPlayer">⏮</button>
                    <button class="player-btn play" id="playBtnPlayer">▶</button>
                    <button class="player-btn" id="pauseBtnPlayer">⏸</button>
                    <button class="player-btn" id="stopBtnPlayer">⏹</button>
                    <button class="player-btn" id="nextBtnPlayer">⏭</button>
                </div>
                <input type="range" id="volumeSliderPlayer" min="0" max="100" value="70" class="volume-slider">
                <div style="font-size:9px; color:#666; text-align:center; margin-top:8px;">Click a song to play</div>
            </div>
            <div class="nav-section">
                <div class="nav-title">CURRENT QUEUE</div>
                <div id="queueList" style="max-height:150px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== DATA STRUCTURES ==========
    let musicLibrary = [];        // { id, name, path, url, artist, album, duration, isFavorite }
    let folders = [];             // list of folder paths
    let albums = new Map();       // album name -> list of songs
    let playlists = new Map();    // playlist name -> song ids
    let favorites = new Set();    // song ids marked as favorite
    
    let currentView = "songs";    // songs, albums, folders, favorites
    let currentFolder = "";       // for folder browsing
    let currentAlbum = "";
    let currentPlaylist = "";
    let queue = [];
    let queueIndex = 0;
    
    let audio = new Audio();
    let isPlaying = false;
    
    // GitHub connection
    let githubToken = localStorage.getItem('walkman_github_token') || "";
    let githubRepo = localStorage.getItem('walkman_github_repo') || "alexandrasrootwork/my-music";
    let githubFolder = localStorage.getItem('walkman_github_folder') || "Music";
    
    // DOM elements
    const repoInput = document.getElementById('githubRepoInput');
    const folderInput = document.getElementById('githubFolderInput');
    const tokenInput = document.getElementById('githubTokenInput');
    const connectBtn = document.getElementById('connectGithubBtn');
    const uploadBtn = document.getElementById('uploadFolderBtn');
    const searchInput = document.getElementById('searchInput');
    
    repoInput.value = githubRepo;
    folderInput.value = githubFolder;
    if (githubToken) tokenInput.value = "••••••••";
    
    function saveSettings() {
        const newToken = tokenInput.value;
        if (newToken && newToken !== "••••••••") {
            githubToken = newToken;
            localStorage.setItem('walkman_github_token', githubToken);
        }
        githubRepo = repoInput.value;
        githubFolder = folderInput.value;
        localStorage.setItem('walkman_github_repo', githubRepo);
        localStorage.setItem('walkman_github_folder', githubFolder);
        document.getElementById('connectionIndicator').innerText = githubRepo ? `📡 ${githubRepo}` : "⚫ Not connected";
    }
    
    // ========== SCAN GITHUB FOR MUSIC ==========
    async function scanGithubMusic() {
        saveSettings();
        if (!githubRepo) { alert("Enter GitHub repo (username/repo)"); return; }
        
        const apiUrl = `https://api.github.com/repos/${githubRepo}/contents/${githubFolder}?ref=main`;
        document.getElementById('libraryContent').innerHTML = '<div style="color:#aaa;">Scanning GitHub...</div>';
        
        try {
            const response = await fetch(apiUrl, {
                headers: githubToken ? { 'Authorization': `token ${githubToken}` } : {}
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const items = await response.json();
            const audioExtensions = ['.mp3', '.wav', '.ogg', '.m4a', '.flac'];
            
            const songs = [];
            const folderSet = new Set();
            
            for (let item of items) {
                if (item.type === 'dir') {
                    folderSet.add(item.path);
                    // Could recursively scan, but for simplicity, just top level
                } else if (item.type === 'file') {
                    const ext = item.name.substring(item.name.lastIndexOf('.')).toLowerCase();
                    if (audioExtensions.includes(ext)) {
                        const rawUrl = `https://raw.githubusercontent.com/${githubRepo}/main/${item.path}`;
                        let name = item.name.replace(/\.[^/.]+$/, '');
                        let artist = "Unknown";
                        let album = "Single";
                        // Try to parse metadata from filename: Artist - Song.mp3 or Song.mp3
                        if (name.includes(' - ')) {
                            const parts = name.split(' - ');
                            artist = parts[0];
                            name = parts.slice(1).join(' - ');
                        }
                        songs.push({
                            id: Date.now() + Math.random() * 10000,
                            name: name,
                            path: item.path,
                            url: rawUrl,
                            artist: artist,
                            album: album,
                            duration: null,
                            isFavorite: favorites.has(item.path)
                        });
                    }
                }
            }
            
            musicLibrary = songs;
            // Build albums
            albums.clear();
            for (let song of musicLibrary) {
                if (!albums.has(song.album)) albums.set(song.album, []);
                albums.get(song.album).push(song);
            }
            
            savePlaylistsToLocal();
            renderLibrary();
            updateConnectionStatus(true);
            
        } catch(err) {
            document.getElementById('libraryContent').innerHTML = `<div style="color:#f66;">Failed: ${err.message}<br>Make sure repo is public or token has access.</div>`;
            updateConnectionStatus(false);
        }
    }
    
    // ========== UPLOAD FILE TO GITHUB ==========
    async function uploadFileToGitHub(file, targetPath) {
        if (!githubRepo || !githubToken) { alert("Set GitHub repo and token first"); return null; }
        
        const reader = new FileReader();
        return new Promise((resolve, reject) => {
            reader.onload = async function(e) {
                const base64Content = e.target.result.split(',')[1];
                const apiUrl = `https://api.github.com/repos/${githubRepo}/contents/${targetPath}`;
                
                let sha = null;
                try {
                    const checkRes = await fetch(apiUrl, { headers: { 'Authorization': `token ${githubToken}` } });
                    if (checkRes.ok) { const existing = await checkRes.json(); sha = existing.sha; }
                } catch(e) {}
                
                const body = {
                    message: sha ? `Update ${file.name}` : `Add ${file.name}`,
                    content: base64Content,
                    branch: 'main'
                };
                if (sha) body.sha = sha;
                
                try {
                    const response = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    resolve({ success: true, url: `https://raw.githubusercontent.com/${githubRepo}/main/${targetPath}` });
                } catch(err) { reject(err); }
            };
            reader.onerror = () => reject(new Error('File read failed'));
            reader.readAsDataURL(file);
        });
    }
    
    async function uploadMultipleFiles() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'audio/*';
        input.multiple = true;
        input.onchange = async (e) => {
            const files = Array.from(e.target.files);
            const folderPath = prompt("Upload to folder (e.g., Music/ or Music/AlbumName):", githubFolder);
            if (!folderPath) return;
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const targetPath = `${folderPath}/${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
                document.getElementById('uploadProgress').innerHTML = `📤 Uploading ${i+1}/${files.length}: ${file.name}`;
                try {
                    await uploadFileToGitHub(file, targetPath);
                } catch(err) {
                    console.error(err);
                }
            }
            document.getElementById('uploadProgress').innerHTML = "✅ Upload complete! Re-scanning...";
            await scanGithubMusic();
            setTimeout(() => { document.getElementById('uploadProgress').innerHTML = ""; }, 3000);
        };
        input.click();
    }
    
    // ========== PLAYLIST MANAGEMENT ==========
    function savePlaylistsToLocal() {
        const playlistsObj = {};
        for (let [name, songIds] of playlists.entries()) {
            playlistsObj[name] = Array.from(songIds);
        }
        localStorage.setItem('walkman_playlists', JSON.stringify(playlistsObj));
        localStorage.setItem('walkman_favorites', JSON.stringify(Array.from(favorites)));
        localStorage.setItem('walkman_music_library', JSON.stringify(musicLibrary.map(s => ({ id: s.id, name: s.name, artist: s.artist, album: s.album, url: s.url, path: s.path }))));
    }
    
    function loadPlaylistsFromLocal() {
        const savedPlaylists = localStorage.getItem('walkman_playlists');
        if (savedPlaylists) {
            const obj = JSON.parse(savedPlaylists);
            playlists.clear();
            for (let [name, ids] of Object.entries(obj)) {
                playlists.set(name, new Set(ids));
            }
        }
        const savedFavs = localStorage.getItem('walkman_favorites');
        if (savedFavs) {
            favorites.clear();
            const favArr = JSON.parse(savedFavs);
            favArr.forEach(f => favorites.add(f));
        }
        const savedLib = localStorage.getItem('walkman_music_library');
        if (savedLib && musicLibrary.length === 0) {
            const libArr = JSON.parse(savedLib);
            musicLibrary = libArr;
        }
        renderPlaylistList();
    }
    
    function createPlaylist(name) {
        if (!name || playlists.has(name)) return;
        playlists.set(name, new Set());
        savePlaylistsToLocal();
        renderPlaylistList();
    }
    
    function deletePlaylist(name) {
        if (confirm(`Delete playlist "${name}"?`)) {
            playlists.delete(name);
            if (currentPlaylist === name) currentPlaylist = "";
            savePlaylistsToLocal();
            renderPlaylistList();
            renderLibrary();
        }
    }
    
    function addToPlaylist(playlistName, songId) {
        if (playlists.has(playlistName)) {
            playlists.get(playlistName).add(songId);
            savePlaylistsToLocal();
        }
    }
    
    function removeFromPlaylist(playlistName, songId) {
        if (playlists.has(playlistName)) {
            playlists.get(playlistName).delete(songId);
            savePlaylistsToLocal();
            renderLibrary();
        }
    }
    
    function toggleFavorite(songId, path) {
        if (favorites.has(path)) favorites.delete(path);
        else favorites.add(path);
        // Update in library
        const song = musicLibrary.find(s => s.id === songId);
        if (song) song.isFavorite = favorites.has(song.path);
        savePlaylistsToLocal();
        renderLibrary();
    }
    
    function renderPlaylistList() {
        const container = document.getElementById('playlistList');
        let html = '';
        for (let [name, songs] of playlists.entries()) {
            html += `<div class="nav-item" data-playlist="${name}" style="justify-content:space-between;">
                        <span>📀 ${name}</span>
                        <button class="del-playlist" data-name="${name}" style="background:none; border:none; color:#f66; cursor:pointer;">✗</button>
                    </div>`;
        }
        container.innerHTML = html || '<div style="color:#555; font-size:10px;">No playlists yet</div>';
        document.querySelectorAll('[data-playlist]').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('del-playlist')) return;
                currentPlaylist = el.dataset.playlist;
                currentView = "playlist";
                renderLibrary();
            });
        });
        document.querySelectorAll('.del-playlist').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); deletePlaylist(btn.dataset.name); });
        });
    }
    
    // ========== RENDER LIBRARY ==========
    function renderLibrary() {
        const searchTerm = searchInput.value.toLowerCase();
        let items = [];
        
        if (currentView === "songs") {
            items = musicLibrary.filter(s => s.name.toLowerCase().includes(searchTerm) || s.artist.toLowerCase().includes(searchTerm));
            renderSongsList(items);
        } else if (currentView === "favorites") {
            items = musicLibrary.filter(s => favorites.has(s.path));
            renderSongsList(items);
        } else if (currentView === "playlist" && currentPlaylist) {
            const songIds = playlists.get(currentPlaylist) || new Set();
            items = musicLibrary.filter(s => songIds.has(s.id));
            renderSongsList(items);
        } else if (currentView === "albums") {
            const albumList = Array.from(albums.keys()).filter(a => a.toLowerCase().includes(searchTerm));
            renderAlbumsList(albumList);
        } else if (currentView === "folders") {
            // Simple folder view from musicLibrary paths
            const foldersSet = new Set();
            musicLibrary.forEach(s => {
                const parts = s.path.split('/');
                if (parts.length > 1) foldersSet.add(parts[0]);
                else foldersSet.add('root');
            });
            renderFoldersList(Array.from(foldersSet));
        }
    }
    
    function renderSongsList(songs) {
        const container = document.getElementById('libraryContent');
        if (!songs.length) { container.innerHTML = '<div style="color:#aaa;">No songs found</div>'; return; }
        
        let html = '<div class="items-grid">';
        songs.forEach(song => {
            const isFav = favorites.has(song.path);
            html += `<div class="song-item" data-id="${song.id}" data-url="${song.url}" data-name="${song.name}" data-artist="${song.artist}">
                        <div class="song-info">
                            <div class="song-title">${escapeHtml(song.name)}</div>
                            <div class="song-meta"><span>${escapeHtml(song.artist)}</span><span>${escapeHtml(song.album)}</span></div>
                        </div>
                        <div class="song-actions">
                            <span class="favorite-star ${isFav ? '' : 'inactive'}" data-id="${song.id}" data-path="${song.path}">${isFav ? '★' : '☆'}</span>
                            <button class="add-to-playlist-btn" data-id="${song.id}" style="background:#2a4a6e; border:none; color:white; padding:2px 6px; border-radius:4px; cursor:pointer;">➕</button>
                        </div>
                    </div>`;
        });
        html += '</div>';
        container.innerHTML = html;
        
        document.querySelectorAll('.song-item').forEach(el => {
            el.addEventListener('click', (e) => {
                if (e.target.classList.contains('favorite-star') || e.target.classList.contains('add-to-playlist-btn')) return;
                const url = el.dataset.url;
                const name = el.dataset.name;
                const artist = el.dataset.artist;
                playSong(url, name, artist);
            });
        });
        document.querySelectorAll('.favorite-star').forEach(star => {
            star.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(star.dataset.id);
                const path = star.dataset.path;
                toggleFavorite(id, path);
            });
        });
        document.querySelectorAll('.add-to-playlist-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const songId = parseInt(btn.dataset.id);
                const playlistName = prompt("Add to which playlist?");
                if (playlistName && playlists.has(playlistName)) {
                    addToPlaylist(playlistName, songId);
                    alert(`Added to "${playlistName}"`);
                } else if (playlistName) {
                    createPlaylist(playlistName);
                    addToPlaylist(playlistName, songId);
                }
            });
        });
    }
    
    function renderAlbumsList(albumNames) {
        let html = '<div class="album-grid">';
        albumNames.forEach(album => {
            const songCount = albums.get(album).length;
            html += `<div class="album-card" data-album="${album}">
                        <div class="album-art">💿</div>
                        <div class="album-name">${escapeHtml(album)}</div>
                        <div style="font-size:8px; color:#666;">${songCount} songs</div>
                    </div>`;
        });
        html += '</div>';
        document.getElementById('libraryContent').innerHTML = html;
        document.querySelectorAll('.album-card').forEach(card => {
            card.addEventListener('click', () => {
                currentAlbum = card.dataset.album;
                renderSongsList(albums.get(currentAlbum));
            });
        });
    }
    
    function renderFoldersList(folderNames) {
        let html = '<div class="items-grid">';
        folderNames.forEach(folder => {
            html += `<div class="folder-item" data-folder="${folder}">
                        <span>📁 ${folder === 'root' ? 'Root' : folder}</span>
                        <span>→</span>
                    </div>`;
        });
        html += '</div>';
        document.getElementById('libraryContent').innerHTML = html;
        document.querySelectorAll('.folder-item').forEach(f => {
            f.addEventListener('click', () => {
                const folder = f.dataset.folder;
                const songsInFolder = musicLibrary.filter(s => s.path.startsWith(folder) || (folder === 'root' && !s.path.includes('/')));
                renderSongsList(songsInFolder);
            });
        });
    }
    
    // ========== PLAYER ==========
    function playSong(url, name, artist) {
        audio.pause();
        audio = new Audio(url);
        audio.volume = document.getElementById('volumeSliderPlayer').value / 100;
        audio.crossOrigin = "anonymous";
        
        document.getElementById('nowPlayingTitle').innerText = name;
        document.getElementById('nowPlayingArtist').innerText = artist || "Unknown";
        
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressFillBig').style.width = percent + '%';
                const cm = Math.floor(audio.currentTime / 60);
                const cs = Math.floor(audio.currentTime % 60);
                const tm = Math.floor(audio.duration / 60);
                const ts = Math.floor(audio.duration % 60);
                document.getElementById('currentTimeDisplay').innerText = `${cm}:${cs.toString().padStart(2,'0')}`;
                document.getElementById('totalTimeDisplay').innerText = `${tm}:${ts.toString().padStart(2,'0')}`;
            }
        });
        audio.addEventListener('ended', () => { isPlaying = false; });
        
        audio.play();
        isPlaying = true;
    }
    
    function playCurrent() { if (audio.src) { audio.play(); isPlaying = true; } }
    function pauseCurrent() { audio.pause(); isPlaying = false; }
    function stopCurrent() { audio.pause(); audio.currentTime = 0; isPlaying = false; document.getElementById('progressFillBig').style.width = '0%'; }
    function setVolume() { audio.volume = document.getElementById('volumeSliderPlayer').value / 100; }
    
    document.getElementById('playBtnPlayer').onclick = playCurrent;
    document.getElementById('pauseBtnPlayer').onclick = pauseCurrent;
    document.getElementById('stopBtnPlayer').onclick = stopCurrent;
    document.getElementById('volumeSliderPlayer').oninput = setVolume;
    document.getElementById('progressBarBig').addEventListener('click', (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        if (audio.duration) audio.currentTime = percent * audio.duration;
    });
    
    // Navigation
    document.querySelectorAll('.nav-item[data-view]').forEach(nav => {
        nav.addEventListener('click', () => {
            currentView = nav.dataset.view;
            currentPlaylist = "";
            renderLibrary();
        });
    });
    
    connectBtn.onclick = scanGithubMusic;
    uploadBtn.onclick = uploadMultipleFiles;
    document.getElementById('createPlaylistBtn').onclick = () => {
        const name = document.getElementById('newPlaylistName').value.trim();
        if (name) { createPlaylist(name); document.getElementById('newPlaylistName').value = ""; }
    };
    searchInput.oninput = () => renderLibrary();
    
    function updateConnectionStatus(ok) {
        const el = document.getElementById('connectionIndicator');
        if (ok) { el.innerText = `✅ Connected to ${githubRepo}`; el.style.color = "#0f0"; }
        else { el.innerText = `⚠️ Not connected`; el.style.color = "#f66"; }
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    loadPlaylistsFromLocal();
    if (githubRepo) scanGithubMusic();
    else renderLibrary();
</script>
</body>
</html>
