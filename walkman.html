<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Retro Walkman - Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #c0c0c0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            padding: 20px;
        }

        /* Walkman Body */
        .walkman {
            background: #2a2a2a;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 8px 8px 0px #1a1a1a, inset 1px 1px 0px #4a4a4a;
            border: 1px solid #1a1a1a;
        }

        /* Cassette Window */
        .cassette-window {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            border: 2px inset #0a0a0a;
        }

        .cassette-label {
            background: #f5deb3;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            color: #333;
            min-height: 60px;
            word-break: break-word;
        }

        .reels {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 15px 0;
        }

        .reel {
            width: 45px;
            height: 45px;
            background: #333;
            border-radius: 50%;
            border: 3px solid #555;
            position: relative;
            animation: spin 2s linear infinite;
            animation-play-state: paused;
        }

        .reel::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            width: 15px;
            height: 15px;
            background: #888;
            border-radius: 50%;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .reel.spinning {
            animation-play-state: running;
        }

        /* Display Screen */
        .display {
            background: #003300;
            color: #00ff00;
            font-family: monospace;
            font-size: 20px;
            padding: 8px 12px;
            text-align: center;
            margin-bottom: 15px;
            border-radius: 6px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ff00;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        /* Buttons */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .walkman-btn {
            background: #444;
            border: none;
            color: white;
            font-size: 20px;
            padding: 12px 18px;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 3px 0 #1a1a1a;
            transition: 0.05s linear;
            font-family: monospace;
            font-weight: bold;
        }

        .walkman-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a1a1a;
        }

        .play-btn { background: #2d5a2d; }
        .pause-btn { background: #8b4513; }
        .stop-btn { background: #8b0000; }
        .prev-btn, .next-btn { background: #2a4a6e; }

        /* Volume Slider */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #333;
            padding: 8px;
            border-radius: 20px;
        }

        .volume-control span {
            color: white;
            font-size: 12px;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #555;
            border-radius: 2px;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #00ff00;
            cursor: pointer;
        }

        /* Music Library */
        .library {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #ccc;
            font-size: 11px;
            padding-bottom: 5px;
            border-bottom: 1px solid #444;
        }

        .song-item {
            background: #2a2a2a;
            padding: 8px 10px;
            margin: 6px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            color: #ddd;
            font-size: 12px;
        }

        .song-item:hover {
            background: #3a3a3a;
        }

        .song-item.active {
            background: #2d5a2d;
            color: white;
        }

        .delete-song {
            background: #8b0000;
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        .add-song {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .add-song input {
            flex: 1;
            padding: 6px;
            font-family: monospace;
            font-size: 11px;
            background: #333;
            border: 1px solid #555;
            color: white;
        }

        .add-song button {
            background: #2d5a2d;
            border: none;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            font-family: monospace;
        }

        .file-input-label {
            background: #2a4a6e;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            color: white;
            display: inline-block;
        }

        .file-input-label input {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #444;
            border-radius: 2px;
            margin: 10px 0;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #00ff00;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #00ff00;
            font-family: monospace;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="walkman">
    <div class="cassette-window">
        <div class="cassette-label" id="cassetteLabel">🎵 No Tape</div>
        <div class="reels">
            <div class="reel" id="reelLeft"></div>
            <div class="reel" id="reelRight"></div>
        </div>
    </div>

    <div class="display" id="nowPlaying">STOPPED</div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-info">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
    </div>

    <div class="buttons">
        <button class="walkman-btn prev-btn" id="prevBtn">⏮</button>
        <button class="walkman-btn play-btn" id="playBtn">▶</button>
        <button class="walkman-btn pause-btn" id="pauseBtn">⏸</button>
        <button class="walkman-btn stop-btn" id="stopBtn">⏹</button>
        <button class="walkman-btn next-btn" id="nextBtn">⏭</button>
    </div>

    <div class="volume-control">
        <span>🔊 VOL</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="70">
    </div>

    <div class="library">
        <div class="library-header">
            <span>📼 MY TAPES (LIBRARY)</span>
            <span id="songCount">0 songs</span>
        </div>
        <div id="songList"></div>
        <div class="add-song">
            <input type="text" id="songUrlInput" placeholder="Music URL (MP3) or YouTube URL...">
            <button id="addUrlBtn">➕ URL</button>
            <label class="file-input-label">
                📁 Upload MP3
                <input type="file" id="fileInput" accept="audio/*">
            </label>
        </div>
        <div class="add-song" style="margin-top: 6px;">
            <input type="text" id="songNameInput" placeholder="Custom name (optional)">
        </div>
    </div>
</div>

<script>
    // ========== WALKMAN MUSIC PLAYER ==========
    let musicLibrary = [];  // { id, name, url, type }
    let currentIndex = 0;
    let audio = new Audio();
    let isPlaying = false;
    
    // Load from localStorage
    function loadLibrary() {
        let saved = localStorage.getItem('walkman_library');
        if (saved) {
            musicLibrary = JSON.parse(saved);
        }
        if (musicLibrary.length === 0) {
            // Add some sample ambient tracks (public domain / free)
            musicLibrary.push({
                id: Date.now(),
                name: "Ambient Chill",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                type: "url"
            });
            musicLibrary.push({
                id: Date.now() + 1,
                name: "Lo-fi Study Beat",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                type: "url"
            });
        }
        saveLibrary();
        renderSongList();
    }
    
    function saveLibrary() {
        localStorage.setItem('walkman_library', JSON.stringify(musicLibrary));
        updateSongCount();
    }
    
    function updateSongCount() {
        document.getElementById('songCount').innerText = musicLibrary.length + ' songs';
    }
    
    function renderSongList() {
        let container = document.getElementById('songList');
        if (musicLibrary.length === 0) {
            container.innerHTML = '<div style="color:#666; text-align:center; padding:20px;">🎵 No songs. Add MP3 files or URLs.</div>';
            return;
        }
        
        let html = '';
        musicLibrary.forEach((song, idx) => {
            let isActive = (idx === currentIndex);
            html += `<div class="song-item ${isActive ? 'active' : ''}" data-index="${idx}">
                <span>🎵 ${escapeHtml(song.name)}</span>
                <button class="delete-song" data-id="${song.id}">✗</button>
            </div>`;
        });
        container.innerHTML = html;
        
        // Click to play song
        document.querySelectorAll('.song-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-song')) return;
                let idx = parseInt(item.dataset.index);
                playSongAtIndex(idx);
            });
        });
        
        // Delete buttons
        document.querySelectorAll('.delete-song').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let id = parseInt(btn.dataset.id);
                deleteSongById(id);
            });
        });
    }
    
    function deleteSongById(id) {
        let idx = musicLibrary.findIndex(s => s.id === id);
        if (idx !== -1) {
            musicLibrary.splice(idx, 1);
            if (musicLibrary.length === 0) {
                currentIndex = 0;
                audio.pause();
                isPlaying = false;
                document.getElementById('nowPlaying').innerText = 'STOPPED';
                document.getElementById('cassetteLabel').innerText = '🎵 No Tape';
                stopReels();
            } else if (currentIndex >= musicLibrary.length) {
                currentIndex = musicLibrary.length - 1;
            } else if (currentIndex === idx) {
                // The current song was deleted
                audio.pause();
                isPlaying = false;
                if (musicLibrary.length > 0) {
                    playSongAtIndex(Math.min(currentIndex, musicLibrary.length - 1));
                }
            }
            saveLibrary();
            renderSongList();
        }
    }
    
    function addSongFromUrl() {
        let url = document.getElementById('songUrlInput').value.trim();
        let customName = document.getElementById('songNameInput').value.trim();
        if (!url) {
            alert('Enter a music URL (direct MP3 link)');
            return;
        }
        
        let name = customName || url.split('/').pop() || 'Untitled';
        if (name.length > 30) name = name.substring(0, 27) + '...';
        
        musicLibrary.push({
            id: Date.now(),
            name: name,
            url: url,
            type: 'url'
        });
        saveLibrary();
        renderSongList();
        document.getElementById('songUrlInput').value = '';
        document.getElementById('songNameInput').value = '';
        alert(`✅ Added "${name}"`);
    }
    
    function addSongFromFile(file) {
        if (!file.type.startsWith('audio/')) {
            alert('Please select an audio file (MP3, WAV, OGG, etc.)');
            return;
        }
        
        let url = URL.createObjectURL(file);
        let name = file.name.replace(/\.[^/.]+$/, ''); // remove extension
        if (name.length > 30) name = name.substring(0, 27) + '...';
        
        musicLibrary.push({
            id: Date.now(),
            name: name,
            url: url,
            type: 'blob',
            blobUrl: url
        });
        saveLibrary();
        renderSongList();
        alert(`✅ Added "${name}"`);
    }
    
    function playSongAtIndex(idx) {
        if (idx < 0 || idx >= musicLibrary.length) return;
        currentIndex = idx;
        let song = musicLibrary[currentIndex];
        
        audio.pause();
        audio = new Audio(song.url);
        audio.volume = document.getElementById('volumeSlider').value / 100;
        
        // Update UI
        document.getElementById('nowPlaying').innerText = song.name;
        document.getElementById('cassetteLabel').innerHTML = `🎵 ${escapeHtml(song.name)}`;
        
        // Time update
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', () => {
            let minutes = Math.floor(audio.duration / 60);
            let seconds = Math.floor(audio.duration % 60);
            document.getElementById('totalTime').innerText = `${minutes}:${seconds.toString().padStart(2,'0')}`;
        });
        audio.addEventListener('ended', () => {
            // Auto play next
            if (currentIndex + 1 < musicLibrary.length) {
                playSongAtIndex(currentIndex + 1);
            } else {
                stopPlayback();
            }
        });
        
        audio.play().then(() => {
            isPlaying = true;
            startReels();
        }).catch(e => {
            console.error('Play error:', e);
            alert('Could not play. URL might not be accessible or CORS blocked.');
            isPlaying = false;
            stopReels();
        });
        
        renderSongList(); // refresh active highlight
    }
    
    function updateProgress() {
        if (audio.duration) {
            let percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            let curMin = Math.floor(audio.currentTime / 60);
            let curSec = Math.floor(audio.currentTime % 60);
            document.getElementById('currentTime').innerText = `${curMin}:${curSec.toString().padStart(2,'0')}`;
        }
    }
    
    function seekTo(e) {
        let bar = document.getElementById('progressBar');
        let rect = bar.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let percent = x / rect.width;
        if (audio.duration) {
            audio.currentTime = percent * audio.duration;
        }
    }
    
    function playCurrent() {
        if (musicLibrary.length === 0) {
            alert('Add some music first!');
            return;
        }
        if (audio.src) {
            audio.play();
            isPlaying = true;
            startReels();
        } else {
            playSongAtIndex(currentIndex);
        }
    }
    
    function pauseCurrent() {
        audio.pause();
        isPlaying = false;
        stopReels();
    }
    
    function stopPlayback() {
        audio.pause();
        audio.currentTime = 0;
        isPlaying = false;
        document.getElementById('nowPlaying').innerText = 'STOPPED';
        document.getElementById('cassetteLabel').innerText = '🎵 No Tape';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('currentTime').innerText = '0:00';
        stopReels();
    }
    
    function nextSong() {
        if (musicLibrary.length === 0) return;
        let nextIdx = (currentIndex + 1) % musicLibrary.length;
        playSongAtIndex(nextIdx);
    }
    
    function prevSong() {
        if (musicLibrary.length === 0) return;
        let prevIdx = (currentIndex - 1 + musicLibrary.length) % musicLibrary.length;
        playSongAtIndex(prevIdx);
    }
    
    function startReels() {
        document.getElementById('reelLeft').classList.add('spinning');
        document.getElementById('reelRight').classList.add('spinning');
    }
    
    function stopReels() {
        document.getElementById('reelLeft').classList.remove('spinning');
        document.getElementById('reelRight').classList.remove('spinning');
    }
    
    function setVolume() {
        let vol = document.getElementById('volumeSlider').value / 100;
        audio.volume = vol;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    // Event listeners
    document.getElementById('playBtn').addEventListener('click', playCurrent);
    document.getElementById('pauseBtn').addEventListener('click', pauseCurrent);
    document.getElementById('stopBtn').addEventListener('click', stopPlayback);
    document.getElementById('nextBtn').addEventListener('click', nextSong);
    document.getElementById('prevBtn').addEventListener('click', prevSong);
    document.getElementById('volumeSlider').addEventListener('input', setVolume);
    document.getElementById('progressBar').addEventListener('click', seekTo);
    document.getElementById('addUrlBtn').addEventListener('click', addSongFromUrl);
    document.getElementById('fileInput').addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            addSongFromFile(e.target.files[0]);
            e.target.value = '';
        }
    });
    
    // Initialize
    loadLibrary();
    if (musicLibrary.length > 0) {
        // Preload first song metadata but don't autoplay
        let testAudio = new Audio(musicLibrary[0].url);
        testAudio.addEventListener('loadedmetadata', () => {
            let minutes = Math.floor(testAudio.duration / 60);
            let seconds = Math.floor(testAudio.duration % 60);
            document.getElementById('totalTime').innerText = `${minutes}:${seconds.toString().padStart(2,'0')}`;
        });
    }
</script>
</body>
</html>
