<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Retro Walkman - Multi Upload & Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #c0c0c0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            padding: 20px;
        }

        .walkman {
            background: #2a2a2a;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 8px 8px 0px #1a1a1a, inset 1px 1px 0px #4a4a4a;
            border: 1px solid #1a1a1a;
            position: relative;
        }

        .cassette-window {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            border: 2px inset #0a0a0a;
        }

        .cassette-label {
            background: #f5deb3;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            color: #333;
            min-height: 60px;
            word-break: break-word;
        }

        .reels {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 15px 0;
        }

        .reel {
            width: 45px;
            height: 45px;
            background: #333;
            border-radius: 50%;
            border: 3px solid #555;
            position: relative;
            animation: spin 2s linear infinite;
            animation-play-state: paused;
        }

        .reel::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            width: 15px;
            height: 15px;
            background: #888;
            border-radius: 50%;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .reel.spinning {
            animation-play-state: running;
        }

        .display {
            background: #003300;
            color: #00ff00;
            font-family: monospace;
            font-size: 16px;
            padding: 8px 12px;
            text-align: center;
            margin-bottom: 15px;
            border-radius: 6px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ff00;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .walkman-btn {
            background: #444;
            border: none;
            color: white;
            font-size: 20px;
            padding: 12px 18px;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 3px 0 #1a1a1a;
            transition: 0.05s linear;
            font-family: monospace;
            font-weight: bold;
        }

        .walkman-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a1a1a;
        }

        .play-btn { background: #2d5a2d; }
        .pause-btn { background: #8b4513; }
        .stop-btn { background: #8b0000; }
        .prev-btn, .next-btn { background: #2a4a6e; }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #333;
            padding: 8px;
            border-radius: 20px;
        }

        .volume-control span {
            color: white;
            font-size: 12px;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #555;
            border-radius: 2px;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #00ff00;
            cursor: pointer;
        }

        .library {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            max-height: 280px;
            overflow-y: auto;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #ccc;
            font-size: 11px;
            padding-bottom: 5px;
            border-bottom: 1px solid #444;
            flex-wrap: wrap;
            gap: 8px;
        }

        .upload-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .upload-btn {
            background: #2a4a6e;
            border: none;
            padding: 4px 10px;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-size: 10px;
            border-radius: 4px;
        }

        .song-item {
            background: #2a2a2a;
            padding: 8px 10px;
            margin: 6px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            color: #ddd;
            font-size: 12px;
        }

        .song-item:hover {
            background: #3a3a3a;
        }

        .song-item.active {
            background: #2d5a2d;
            color: white;
        }

        .delete-song {
            background: #8b0000;
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #444;
            border-radius: 2px;
            margin: 10px 0;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #00ff00;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #00ff00;
            font-family: monospace;
            margin-top: 4px;
        }

        .sync-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 4px 10px;
            font-size: 10px;
            z-index: 1000;
            font-family: 'MS Sans Serif', Tahoma, sans-serif;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            width: 400px;
            max-width: 90%;
        }

        .modal-title-bar {
            background: #000080;
            color: white;
            padding: 6px 8px;
            display: flex;
            justify-content: space-between;
            cursor: move;
        }

        .modal-body {
            padding: 15px;
        }

        .modal-body input {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }

        .retro-button {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 4px 12px;
            cursor: pointer;
            font-family: monospace;
            margin-top: 5px;
        }

        .batch-status {
            background: #333;
            color: #0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-family: monospace;
            margin-top: 8px;
            text-align: center;
        }

        @media (max-width: 550px) {
            .walkman { padding: 12px; }
            .walkman-btn { padding: 8px 12px; font-size: 16px; }
            .display { font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="walkman">
    <div class="cassette-window">
        <div class="cassette-label" id="cassetteLabel">🎵 No Tape</div>
        <div class="reels">
            <div class="reel" id="reelLeft"></div>
            <div class="reel" id="reelRight"></div>
        </div>
    </div>

    <div class="display" id="nowPlaying">STOPPED</div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-info">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
    </div>

    <div class="buttons">
        <button class="walkman-btn prev-btn" id="prevBtn">⏮</button>
        <button class="walkman-btn play-btn" id="playBtn">▶</button>
        <button class="walkman-btn pause-btn" id="pauseBtn">⏸</button>
        <button class="walkman-btn stop-btn" id="stopBtn">⏹</button>
        <button class="walkman-btn next-btn" id="nextBtn">⏭</button>
    </div>

    <div class="volume-control">
        <span>🔊 VOL</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="70">
    </div>

    <div class="library">
        <div class="library-header">
            <span>📼 MY TAPES (LIBRARY)</span>
            <div class="upload-buttons">
                <label class="upload-btn">
                    📁 Multiple Files
                    <input type="file" id="multiFileInput" accept="audio/*" multiple style="display:none;">
                </label>
                <label class="upload-btn">
                    📂 Entire Folder
                    <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none;">
                </label>
                <label class="upload-btn">
                    🎵 Single MP3
                    <input type="file" id="singleFileInput" accept="audio/*" style="display:none;">
                </label>
            </div>
        </div>
        <div id="songList"></div>
        <div class="add-song" style="display: flex; gap: 8px; margin-top: 10px;">
            <input type="text" id="songUrlInput" placeholder="Music URL (MP3)..." style="flex:1; padding:6px; background:#333; border:1px solid #555; color:white;">
            <button id="addUrlBtn" style="background:#2d5a2d; border:none; padding:6px 12px; color:white; cursor:pointer;">➕ URL</button>
        </div>
        <div id="batchStatus" class="batch-status" style="display:none;"></div>
    </div>
</div>

<div class="sync-status" id="syncStatusIndicator">☁️ Ready</div>

<!-- Sync Modal -->
<div class="modal" id="syncModal">
    <div class="modal-content">
        <div class="modal-title-bar" id="syncTitleBar">
            <span>☁️ Sync Settings</span>
            <span style="cursor:pointer" id="closeSyncModal">✗</span>
        </div>
        <div class="modal-body">
            <p style="margin-bottom:10px; font-size:11px;">Use the same Gist ID across devices to sync your music library.</p>
            <label>GitHub Token:</label>
            <input type="password" id="syncToken" placeholder="Enter your GitHub Personal Access Token">
            <label>Gist ID (same across devices):</label>
            <input type="text" id="syncGistId" placeholder="Gist ID">
            <button id="saveSyncSettingsBtn" class="retro-button">💾 Save & Sync</button>
            <button id="resetSyncBtn" class="retro-button" style="margin-left:8px;">🗑️ Clear Settings</button>
            <div id="syncStatusMsg" style="margin-top:10px; font-size:11px; color:#666;"></div>
        </div>
    </div>
</div>

<script>
    // ========== GIST SYNC ==========
    let githubToken = localStorage.getItem('walkman_github_token');
    let gistId = localStorage.getItem('walkman_gist_id');
    let syncInProgress = false;
    
    // ========== MUSIC DATA ==========
    let musicLibrary = [];
    let currentIndex = 0;
    let audio = new Audio();
    let isPlaying = false;
    
    // ========== SYNC FUNCTIONS ==========
    function updateSyncStatus(message, type) {
        const indicator = document.getElementById('syncStatusIndicator');
        if (indicator) {
            indicator.textContent = message;
            indicator.style.background = type === 'success' ? '#00aa00' : (type === 'error' ? '#aa0000' : (type === 'loading' ? '#000080' : '#c0c0c0'));
            indicator.style.color = type === 'loading' ? 'white' : 'black';
        }
    }
    
    async function loadFromGist() {
        if (!githubToken || !gistId) return false;
        updateSyncStatus("Loading...", "loading");
        try {
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                headers: { 'Authorization': `token ${githubToken}` }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const gist = await response.json();
            const content = gist.files['walkman-music.json']?.content;
            if (content) {
                const allData = JSON.parse(content);
                if (allData.musicLibrary && Array.isArray(allData.musicLibrary)) {
                    musicLibrary = allData.musicLibrary;
                    updateSyncStatus("✅ Synced", "success");
                    setTimeout(() => updateSyncStatus("☁️ Synced", "idle"), 2000);
                    return true;
                }
            }
        } catch (err) {
            console.error('Gist load error:', err);
            updateSyncStatus("❌ Failed", "error");
            setTimeout(() => updateSyncStatus("☁️ Error", "idle"), 2000);
        }
        return false;
    }
    
    async function saveToGist() {
        if (!githubToken || !gistId || syncInProgress) return false;
        syncInProgress = true;
        updateSyncStatus("Saving...", "loading");
        try {
            let existingData = {};
            try {
                const getResponse = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                if (getResponse.ok) {
                    const gist = await getResponse.json();
                    const content = gist.files['walkman-music.json']?.content;
                    if (content) existingData = JSON.parse(content);
                }
            } catch (e) {}
            
            existingData.musicLibrary = musicLibrary;
            existingData.lastSync = new Date().toISOString();
            
            const content = JSON.stringify(existingData, null, 2);
            const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    files: { 'walkman-music.json': { content: content } }
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            updateSyncStatus("✅ Saved", "success");
            setTimeout(() => updateSyncStatus("☁️ Synced", "idle"), 2000);
            return true;
        } catch (err) {
            console.error('Gist save error:', err);
            updateSyncStatus("❌ Failed", "error");
            setTimeout(() => updateSyncStatus("☁️ Error", "idle"), 2000);
            return false;
        } finally {
            syncInProgress = false;
        }
    }
    
    // ========== LOCAL STORAGE ==========
    function loadLocalFallback() {
        const saved = localStorage.getItem('walkman_music_library');
        if (saved) {
            musicLibrary = JSON.parse(saved);
        }
        if (musicLibrary.length === 0) {
            musicLibrary.push({
                id: Date.now(),
                name: "Ambient Chill (Sample)",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                type: "url"
            });
            musicLibrary.push({
                id: Date.now() + 1,
                name: "Lo-fi Study Beat (Sample)",
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                type: "url"
            });
        }
    }
    
    async function loadMusicLibrary() {
        if (githubToken && gistId) {
            const loaded = await loadFromGist();
            if (!loaded) {
                loadLocalFallback();
            }
        } else {
            loadLocalFallback();
        }
        saveToLocal();
        renderSongList();
        updateSongCount();
    }
    
    function saveToLocal() {
        localStorage.setItem('walkman_music_library', JSON.stringify(musicLibrary));
        if (githubToken && gistId) {
            saveToGist();
        }
        updateSongCount();
    }
    
    function updateSongCount() {
        const countSpan = document.getElementById('songCount');
        if (countSpan) countSpan.innerText = musicLibrary.length + ' songs';
    }
    
    // ========== MULTI FILE UPLOAD ==========
    function showBatchStatus(message, isError = false) {
        const statusDiv = document.getElementById('batchStatus');
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = message;
        statusDiv.style.color = isError ? '#ff6666' : '#00ff00';
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 3000);
    }
    
    function addMultipleSongs(files) {
        const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/'));
        if (audioFiles.length === 0) {
            showBatchStatus('❌ No audio files found', true);
            return;
        }
        
        let added = 0;
        for (let file of audioFiles) {
            let url = URL.createObjectURL(file);
            let name = file.name.replace(/\.[^/.]+$/, '');
            if (name.length > 40) name = name.substring(0, 37) + '...';
            
            // Check for duplicate by name (simple check)
            let exists = musicLibrary.some(s => s.name === name);
            if (!exists) {
                musicLibrary.push({
                    id: Date.now() + Math.random(),
                    name: name,
                    url: url,
                    type: 'blob',
                    blobUrl: url
                });
                added++;
            }
        }
        
        saveToLocal();
        renderSongList();
        showBatchStatus(`✅ Added ${added} new songs (${audioFiles.length - added} duplicates skipped)`);
    }
    
    function addFolderSongs(files) {
        // Files from folder input have webkitRelativePath
        const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/'));
        if (audioFiles.length === 0) {
            showBatchStatus('❌ No audio files found in folder', true);
            return;
        }
        
        let added = 0;
        for (let file of audioFiles) {
            let url = URL.createObjectURL(file);
            let relativePath = file.webkitRelativePath || file.name;
            let name = relativePath.replace(/\.[^/.]+$/, '').replace(/\//g, ' › ');
            if (name.length > 40) name = name.substring(0, 37) + '...';
            
            let exists = musicLibrary.some(s => s.name === name);
            if (!exists) {
                musicLibrary.push({
                    id: Date.now() + Math.random(),
                    name: name,
                    url: url,
                    type: 'blob',
                    blobUrl: url,
                    path: relativePath
                });
                added++;
            }
        }
        
        saveToLocal();
        renderSongList();
        showBatchStatus(`✅ Added ${added} songs from folder (${audioFiles.length - added} duplicates skipped)`);
    }
    
    function addSingleSong(file) {
        if (!file.type.startsWith('audio/')) {
            alert('Please select an audio file');
            return;
        }
        
        let url = URL.createObjectURL(file);
        let name = file.name.replace(/\.[^/.]+$/, '');
        if (name.length > 40) name = name.substring(0, 37) + '...';
        
        musicLibrary.push({
            id: Date.now(),
            name: name,
            url: url,
            type: 'blob',
            blobUrl: url
        });
        
        saveToLocal();
        renderSongList();
        showBatchStatus(`✅ Added "${name}"`);
    }
    
    function addSongFromUrl() {
        let url = document.getElementById('songUrlInput').value.trim();
        if (!url) {
            alert('Enter a music URL (direct MP3 link)');
            return;
        }
        
        let name = url.split('/').pop() || 'Untitled';
        if (name.length > 40) name = name.substring(0, 37) + '...';
        if (name.includes('?')) name = name.split('?')[0];
        
        musicLibrary.push({
            id: Date.now(),
            name: name,
            url: url,
            type: 'url'
        });
        
        saveToLocal();
        renderSongList();
        document.getElementById('songUrlInput').value = '';
        showBatchStatus(`✅ Added "${name}"`);
    }
    
    // ========== MUSIC PLAYER ==========
    function renderSongList() {
        let container = document.getElementById('songList');
        if (musicLibrary.length === 0) {
            container.innerHTML = '<div style="color:#666; text-align:center; padding:20px;">🎵 No songs. Upload MP3 files or add URLs.</div>';
            return;
        }
        
        let html = '';
        musicLibrary.forEach((song, idx) => {
            let isActive = (idx === currentIndex);
            html += `<div class="song-item ${isActive ? 'active' : ''}" data-index="${idx}">
                <span>🎵 ${escapeHtml(song.name)}</span>
                <button class="delete-song" data-id="${song.id}">✗</button>
            </div>`;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.song-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-song')) return;
                let idx = parseInt(item.dataset.index);
                playSongAtIndex(idx);
            });
        });
        
        document.querySelectorAll('.delete-song').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                let id = parseInt(btn.dataset.id);
                deleteSongById(id);
            });
        });
    }
    
    function deleteSongById(id) {
        let idx = musicLibrary.findIndex(s => s.id === id);
        if (idx !== -1) {
            // Clean up blob URL if exists
            if (musicLibrary[idx].blobUrl) {
                URL.revokeObjectURL(musicLibrary[idx].blobUrl);
            }
            musicLibrary.splice(idx, 1);
            
            if (musicLibrary.length === 0) {
                currentIndex = 0;
                audio.pause();
                isPlaying = false;
                document.getElementById('nowPlaying').innerText = 'STOPPED';
                document.getElementById('cassetteLabel').innerText = '🎵 No Tape';
                stopReels();
            } else if (currentIndex >= musicLibrary.length) {
                currentIndex = musicLibrary.length - 1;
            } else if (currentIndex === idx) {
                audio.pause();
                isPlaying = false;
                if (musicLibrary.length > 0) {
                    playSongAtIndex(Math.min(currentIndex, musicLibrary.length - 1));
                }
            }
            saveToLocal();
            renderSongList();
        }
    }
    
    function playSongAtIndex(idx) {
        if (idx < 0 || idx >= musicLibrary.length) return;
        currentIndex = idx;
        let song = musicLibrary[currentIndex];
        
        audio.pause();
        audio = new Audio(song.url);
        audio.volume = document.getElementById('volumeSlider').value / 100;
        
        document.getElementById('nowPlaying').innerText = song.name;
        document.getElementById('cassetteLabel').innerHTML = `🎵 ${escapeHtml(song.name)}`;
        
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', () => {
            if (audio.duration && isFinite(audio.duration)) {
                let minutes = Math.floor(audio.duration / 60);
                let seconds = Math.floor(audio.duration % 60);
                document.getElementById('totalTime').innerText = `${minutes}:${seconds.toString().padStart(2,'0')}`;
            }
        });
        audio.addEventListener('ended', () => {
            if (currentIndex + 1 < musicLibrary.length) {
                playSongAtIndex(currentIndex + 1);
            } else {
                stopPlayback();
            }
        });
        
        audio.play().then(() => {
            isPlaying = true;
            startReels();
        }).catch(e => {
            console.error('Play error:', e);
            alert('Could not play. URL might not be accessible or CORS blocked.');
            isPlaying = false;
            stopReels();
        });
        
        renderSongList();
    }
    
    function updateProgress() {
        if (audio.duration && isFinite(audio.duration)) {
            let percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            let curMin = Math.floor(audio.currentTime / 60);
            let curSec = Math.floor(audio.currentTime % 60);
            document.getElementById('currentTime').innerText = `${curMin}:${curSec.toString().padStart(2,'0')}`;
        }
    }
    
    function seekTo(e) {
        let bar = document.getElementById('progressBar');
        let rect = bar.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let percent = x / rect.width;
        if (audio.duration && isFinite(audio.duration)) {
            audio.currentTime = percent * audio.duration;
        }
    }
    
    function playCurrent() {
        if (musicLibrary.length === 0) {
            alert('Add some music first!');
            return;
        }
        if (audio.src) {
            audio.play();
            isPlaying = true;
            startReels();
        } else {
            playSongAtIndex(currentIndex);
        }
    }
    
    function pauseCurrent() {
        audio.pause();
        isPlaying = false;
        stopReels();
    }
    
    function stopPlayback() {
        audio.pause();
        audio.currentTime = 0;
        isPlaying = false;
        document.getElementById('nowPlaying').innerText = 'STOPPED';
        document.getElementById('cassetteLabel').innerText = '🎵 No Tape';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('currentTime').innerText = '0:00';
        stopReels();
    }
    
    function nextSong() {
        if (musicLibrary.length === 0) return;
        let nextIdx = (currentIndex + 1) % musicLibrary.length;
        playSongAtIndex(nextIdx);
    }
    
    function prevSong() {
        if (musicLibrary.length === 0) return;
        let prevIdx = (currentIndex - 1 + musicLibrary.length) % musicLibrary.length;
        playSongAtIndex(prevIdx);
    }
    
    function startReels() {
        document.getElementById('reelLeft').classList.add('spinning');
        document.getElementById('reelRight').classList.add('spinning');
    }
    
    function stopReels() {
        document.getElementById('reelLeft').classList.remove('spinning');
        document.getElementById('reelRight').classList.remove('spinning');
    }
    
    function setVolume() {
        let vol = document.getElementById('volumeSlider').value / 100;
        audio.volume = vol;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    // ========== SYNC MODAL ==========
    function openSyncModal() {
        document.getElementById('syncToken').value = '';
        document.getElementById('syncGistId').value = gistId || '';
        document.getElementById('syncModal').style.display = 'flex';
    }
    
    function saveSyncSettings() {
        const newToken = document.getElementById('syncToken').value.trim();
        const newGistId = document.getElementById('syncGistId').value.trim();
        if (newToken) {
            githubToken = newToken;
            localStorage.setItem('walkman_github_token', newToken);
        }
        if (newGistId) {
            gistId = newGistId;
            localStorage.setItem('walkman_gist_id', newGistId);
        }
        document.getElementById('syncModal').style.display = 'none';
        updateSyncStatus("Settings saved, reloading...", "loading");
        setTimeout(() => location.reload(), 1000);
    }
    
    function resetSyncSettings() {
        localStorage.removeItem('walkman_github_token');
        localStorage.removeItem('walkman_gist_id');
        githubToken = null;
        gistId = null;
        document.getElementById('syncModal').style.display = 'none';
        updateSyncStatus("Settings cleared", "success");
        setTimeout(() => location.reload(), 1000);
    }
    
    function makeDraggable(popupId, handleId) {
        const popup = document.getElementById(popupId);
        const handle = document.getElementById(handleId);
        if (!popup || !handle) return;
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        handle.onmousedown = dragMouseDown;
        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDrag;
            document.onmousemove = elementDrag;
        }
        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            popup.style.top = (popup.offsetTop - pos2) + 'px';
            popup.style.left = (popup.offsetLeft - pos1) + 'px';
            popup.style.transform = 'none';
        }
        function closeDrag() {
            document.onmouseup = null;
            document.onmousemove = null;
        }
    }
    
    // ========== EVENT LISTENERS ==========
    document.getElementById('playBtn').addEventListener('click', playCurrent);
    document.getElementById('pauseBtn').addEventListener('click', pauseCurrent);
    document.getElementById('stopBtn').addEventListener('click', stopPlayback);
    document.getElementById('nextBtn').addEventListener('click', nextSong);
    document.getElementById('prevBtn').addEventListener('click', prevSong);
    document.getElementById('volumeSlider').addEventListener('input', setVolume);
    document.getElementById('progressBar').addEventListener('click', seekTo);
    document.getElementById('addUrlBtn').addEventListener('click', addSongFromUrl);
    
    // File upload handlers
    document.getElementById('multiFileInput').addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            addMultipleSongs(e.target.files);
            e.target.value = '';
        }
    });
    document.getElementById('folderInput').addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            addFolderSongs(e.target.files);
            e.target.value = '';
        }
    });
    document.getElementById('singleFileInput').addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            addSingleSong(e.target.files[0]);
            e.target.value = '';
        }
    });
    
    // Trigger hidden file inputs via labels
    document.querySelectorAll('.upload-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            // Already handled by label's for or child input
        });
    });
    
    document.getElementById('syncStatusIndicator').addEventListener('click', openSyncModal);
    document.getElementById('closeSyncModal').addEventListener('click', () => document.getElementById('syncModal').style.display = 'none');
    document.getElementById('saveSyncSettingsBtn').addEventListener('click', saveSyncSettings);
    document.getElementById('resetSyncBtn').addEventListener('click', resetSyncSettings);
    
    makeDraggable('syncModal', 'syncTitleBar');
    
    // ========== INIT ==========
    loadMusicLibrary();
</script>
</body>
</html>
