<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Retro Walkman - Music Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #c0c0c0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            padding: 20px;
        }
        .walkman {
            background: #2a2a2a;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 750px;
            box-shadow: 8px 8px 0px #1a1a1a, inset 1px 1px 0px #4a4a4a;
            border: 1px solid #1a1a1a;
        }
        .cassette-window {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            border: 2px inset #0a0a0a;
        }
        .cassette-label {
            background: #f5deb3;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            color: #333;
            min-height: 60px;
            word-break: break-word;
        }
        .reels { display: flex; justify-content: center; gap: 40px; margin: 15px 0; }
        .reel {
            width: 45px; height: 45px; background: #333; border-radius: 50%;
            border: 3px solid #555; position: relative;
            animation: spin 2s linear infinite; animation-play-state: paused;
        }
        .reel::after { content: ''; position: absolute; top: 12px; left: 12px; width: 15px; height: 15px; background: #888; border-radius: 50%; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .reel.spinning { animation-play-state: running; }
        .display {
            background: #003300; color: #00ff00; font-family: monospace; font-size: 16px;
            padding: 8px 12px; text-align: center; margin-bottom: 15px; border-radius: 6px;
            letter-spacing: 2px; text-shadow: 0 0 5px #00ff00; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        .buttons { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .walkman-btn {
            background: #444; border: none; color: white; font-size: 20px; padding: 12px 18px;
            cursor: pointer; border-radius: 8px; box-shadow: 0 3px 0 #1a1a1a;
            font-family: monospace; font-weight: bold;
        }
        .walkman-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1a1a1a; }
        .play-btn { background: #2d5a2d; }
        .pause-btn { background: #8b4513; }
        .stop-btn { background: #8b0000; }
        .prev-btn, .next-btn { background: #2a4a6e; }
        .volume-control {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
            background: #333; padding: 8px; border-radius: 20px;
        }
        .volume-control span { color: white; font-size: 12px; }
        input[type="range"] { flex: 1; height: 4px; -webkit-appearance: none; background: #555; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%; background: #00ff00; cursor: pointer; }
        .library {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            max-height: 350px;
            overflow-y: auto;
        }
        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #ccc;
            font-size: 11px;
            padding-bottom: 5px;
            border-bottom: 1px solid #444;
            flex-wrap: wrap;
            gap: 8px;
        }
        .nav-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav-btn {
            background: #2a4a6e;
            border: none;
            padding: 4px 10px;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-size: 10px;
            border-radius: 4px;
        }
        .nav-btn.active {
            background: #2d5a2d;
        }
        .current-folder {
            color: #0f0;
            font-size: 10px;
            font-family: monospace;
            flex: 1;
            text-align: right;
        }
        .section-title {
            color: #aaa;
            font-size: 10px;
            margin: 10px 0 5px;
            border-left: 2px solid #2d5a2d;
            padding-left: 8px;
        }
        .repo-settings {
            background: #252525;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .repo-settings input, .repo-settings select {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 6px;
            font-family: monospace;
            font-size: 11px;
            border-radius: 4px;
        }
        .retro-button {
            background: #2a4a6e;
            border: none;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
            border-radius: 4px;
        }
        .retro-button.danger { background: #8b0000; }
        .retro-button.success { background: #2d5a2d; }
        .retro-button.warning { background: #b8860b; }
        .song-item {
            background: #2a2a2a;
            padding: 8px 10px;
            margin: 6px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: #ddd;
            font-size: 12px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .song-item:hover { background: #3a3a3a; }
        .song-item.active { background: #2d5a2d; color: white; }
        .song-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .song-name { font-weight: bold; }
        .song-artist { font-size: 10px; color: #aaa; }
        .active .song-artist { color: #cfc; }
        .star-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.6;
        }
        .star-btn.starred { opacity: 1; color: #ffcc00; text-shadow: 0 0 2px #ffcc00; }
        .folder-item {
            background: #252525;
            padding: 6px 10px;
            margin: 4px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: #88ccff;
            font-size: 12px;
        }
        .folder-item:hover { background: #353535; }
        .progress-bar { width: 100%; height: 4px; background: #444; border-radius: 2px; margin: 10px 0; cursor: pointer; }
        .progress-fill { height: 100%; background: #00ff00; border-radius: 2px; width: 0%; }
        .time-info { display: flex; justify-content: space-between; font-size: 10px; color: #00ff00; font-family: monospace; margin-top: 4px; }
        .sync-status {
            position: fixed; bottom: 10px; right: 10px; background: #c0c0c0;
            border: 2px solid #fff; border-right-color: #000; border-bottom-color: #000;
            padding: 4px 10px; font-size: 10px; z-index: 1000; font-family: monospace; cursor: pointer;
        }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #c0c0c0; border: 2px solid #fff; border-right-color: #000; border-bottom-color: #000;
            width: 400px; max-width: 90%;
        }
        .modal-title-bar { background: #000080; color: white; padding: 6px 8px; display: flex; justify-content: space-between; cursor: move; }
        .modal-body { padding: 15px; }
        .modal-body input, .modal-body select { width: 100%; margin-bottom: 10px; padding: 5px; }
        .status-msg {
            background: #333;
            padding: 6px;
            border-radius: 4px;
            font-size: 10px;
            font-family: monospace;
            margin-top: 8px;
            text-align: center;
        }
        .flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .progress-bar-upload {
            height: 4px;
            background: #444;
            border-radius: 2px;
            margin: 8px 0;
            display: none;
        }
        .progress-fill-upload { height: 100%; background: #2d5a2d; border-radius: 2px; width: 0%; }
        @media (max-width: 600px) {
            .walkman { padding: 12px; }
            .walkman-btn { padding: 8px 12px; font-size: 16px; }
            .display { font-size: 13px; }
            .song-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="walkman">
    <div class="cassette-window">
        <div class="cassette-label" id="cassetteLabel">🎵 No Tape</div>
        <div class="reels">
            <div class="reel" id="reelLeft"></div>
            <div class="reel" id="reelRight"></div>
        </div>
    </div>
    <div class="display" id="nowPlaying">STOPPED</div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="time-info"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
    <div class="buttons">
        <button class="walkman-btn prev-btn" id="prevBtn">⏮</button>
        <button class="walkman-btn play-btn" id="playBtn">▶</button>
        <button class="walkman-btn pause-btn" id="pauseBtn">⏸</button>
        <button class="walkman-btn stop-btn" id="stopBtn">⏹</button>
        <button class="walkman-btn next-btn" id="nextBtn">⏭</button>
    </div>
    <div class="volume-control"><span>🔊 VOL</span><input type="range" id="volumeSlider" min="0" max="100" value="70"></div>
    
    <div class="library">
        <div class="library-header">
            <span>📼 GITHUB MUSIC WALKMAN</span>
            <span id="songCount">0 songs</span>
        </div>
        
        <!-- GitHub Repo Settings -->
        <div class="repo-settings">
            <div class="flex-row" style="margin-bottom: 8px;">
                <input type="text" id="githubRepo" placeholder="username/repo" style="flex:2;">
                <input type="text" id="githubFolder" value="Music" placeholder="folder" style="flex:1;">
                <select id="githubBranch" style="width: 100px;">
                    <option value="main">main</option>
                    <option value="master">master</option>
                </select>
            </div>
            <div class="flex-row">
                <input type="password" id="githubToken" placeholder="GitHub Token (repo scope)" style="flex:3;">
                <button id="testConnectionBtn" class="retro-button">🔌 Test</button>
            </div>
        </div>
        
        <!-- Navigation: Library / Favorites -->
        <div class="nav-bar">
            <button id="viewLibraryBtn" class="nav-btn active">📀 All Music</button>
            <button id="viewFavoritesBtn" class="nav-btn">⭐ Favorites</button>
            <button id="createFolderBtn" class="nav-btn">📁 + New Folder</button>
            <button id="refreshBtn" class="nav-btn">🔄 Refresh</button>
            <span class="current-folder" id="currentFolderDisplay">📂 Music/</span>
        </div>
        
        <!-- Folder Browser -->
        <div id="folderBrowser" style="margin-bottom: 10px;"></div>
        
        <!-- Song List -->
        <div id="songList"></div>
        
        <!-- Upload Area -->
        <div class="section-title">📤 UPLOAD TO CURRENT FOLDER</div>
        <div class="flex-row" style="margin: 8px 0;">
            <label class="retro-button success" style="cursor: pointer;">
                🎵 Upload MP3
                <input type="file" id="uploadFileInput" accept="audio/*" style="display: none;">
            </label>
            <label class="retro-button" style="cursor: pointer;">
                📁 Multiple Files
                <input type="file" id="uploadMultiInput" accept="audio/*" multiple style="display: none;">
            </label>
            <button id="scanGithubBtn" class="retro-button">🔄 Scan GitHub</button>
        </div>
        <div id="uploadProgress" class="progress-bar-upload"><div class="progress-fill-upload" id="uploadProgressFill"></div></div>
        <div id="uploadStatus" class="status-msg" style="margin-top: 6px; font-size: 9px;">Ready</div>
    </div>
</div>

<div class="sync-status" id="syncStatusIndicator">☁️ Ready</div>

<script>
    // ========== CONFIGURATION ==========
    let githubToken = localStorage.getItem('walkman_upload_token') || "";
    let githubRepo = localStorage.getItem('walkman_github_repo') || "";
    let githubBaseFolder = localStorage.getItem('walkman_github_folder') || "Music";
    let githubBranch = localStorage.getItem('walkman_github_branch') || "main";
    
    // App state
    let musicLibrary = [];        // { id, name, artist, url, path, folder, starred }
    let currentView = "library";  // "library" or "favorites"
    let currentFolder = "";       // relative path within Music folder (e.g., "Rock" or "Rock/Subfolder")
    let folders = [];             // list of folders found
    let currentIndex = 0;
    let audio = new Audio();
    let isPlaying = false;
    
    // DOM elements
    const repoInput = document.getElementById('githubRepo');
    const folderInput = document.getElementById('githubFolder');
    const branchSelect = document.getElementById('githubBranch');
    const tokenInput = document.getElementById('githubToken');
    
    // Load saved settings
    if (githubRepo) repoInput.value = githubRepo;
    if (githubBaseFolder) folderInput.value = githubBaseFolder;
    branchSelect.value = githubBranch;
    if (githubToken) tokenInput.value = "••••••••";
    
    function saveSettings() {
        githubRepo = repoInput.value.trim();
        githubBaseFolder = folderInput.value.trim();
        githubBranch = branchSelect.value;
        if (tokenInput.value && tokenInput.value !== "••••••••") {
            githubToken = tokenInput.value;
            localStorage.setItem('walkman_upload_token', githubToken);
        }
        localStorage.setItem('walkman_github_repo', githubRepo);
        localStorage.setItem('walkman_github_folder', githubBaseFolder);
        localStorage.setItem('walkman_github_branch', githubBranch);
    }
    
    // ========== HELPER FUNCTIONS ==========
    function showStatus(msg, isError = false) {
        const div = document.getElementById('uploadStatus');
        div.textContent = msg;
        div.style.color = isError ? '#ff6666' : '#00ff00';
        setTimeout(() => {
            if (document.getElementById('uploadStatus').textContent === msg) {
                div.textContent = 'Ready';
                div.style.color = '#aaa';
            }
        }, 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function parseMetadata(filename) {
        // Try to extract artist from "Artist - Song Name.mp3" format
        let name = filename.replace(/\.[^/.]+$/, '');
        let artist = "";
        if (name.includes(" - ")) {
            const parts = name.split(" - ");
            artist = parts[0];
            name = parts.slice(1).join(" - ");
        }
        return { name: name.length > 40 ? name.substring(0,37)+'...' : name, artist: artist.substring(0,30) };
    }
    
    // ========== GITHUB API FUNCTIONS ==========
    async function getFolderContents(folderPath = "") {
        if (!githubRepo) return [];
        saveSettings();
        
        const fullPath = githubBaseFolder ? (folderPath ? `${githubBaseFolder}/${folderPath}` : githubBaseFolder) : folderPath;
        const apiUrl = `https://api.github.com/repos/${githubRepo}/contents/${fullPath}?ref=${githubBranch}`;
        
        try {
            const response = await fetch(apiUrl, {
                headers: githubToken ? { 'Authorization': `token ${githubToken}` } : {}
            });
            if (!response.ok) return [];
            const items = await response.json();
            if (!Array.isArray(items)) return [];
            
            const audioFiles = [];
            const subfolders = [];
            
            for (let item of items) {
                if (item.type === 'dir') {
                    subfolders.push({ name: item.name, path: folderPath ? `${folderPath}/${item.name}` : item.name });
                } else if (item.type === 'file' && item.name.match(/\.(mp3|wav|ogg|m4a|flac)$/i)) {
                    const rawUrl = `https://raw.githubusercontent.com/${githubRepo}/${githubBranch}/${item.path}`;
                    const metadata = parseMetadata(item.name);
                    audioFiles.push({
                        id: item.sha,
                        name: metadata.name,
                        artist: metadata.artist,
                        url: rawUrl,
                        path: item.path,
                        folder: folderPath,
                        starred: localStorage.getItem(`starred_${item.path}`) === 'true'
                    });
                }
            }
            return { songs: audioFiles, folders: subfolders };
        } catch(err) {
            console.error('Scan error:', err);
            return { songs: [], folders: [] };
        }
    }
    
    async function scanEntireLibrary() {
        if (!githubRepo) {
            showStatus("❌ Enter GitHub repo first", true);
            return;
        }
        showStatus("🔍 Scanning GitHub library...");
        
        async function scanFolder(relPath = "") {
            const result = await getFolderContents(relPath);
            let allSongs = [...result.songs];
            for (let sub of result.folders) {
                const subResult = await scanFolder(sub.path);
                allSongs = allSongs.concat(subResult);
            }
            return allSongs;
        }
        
        const allSongs = await scanFolder("");
        musicLibrary = allSongs;
        
        // Build folder list
        const folderSet = new Set();
        musicLibrary.forEach(song => {
            if (song.folder) folderSet.add(song.folder);
        });
        folders = Array.from(folderSet).sort();
        
        savePlaylist();
        renderCurrentView();
        showStatus(`✅ Loaded ${musicLibrary.length} songs`);
    }
    
    async function uploadToCurrentFolder(file) {
        if (!githubRepo || !githubToken) {
            showStatus("❌ Set GitHub repo and token first", true);
            return null;
        }
        saveSettings();
        
        const folderPath = currentFolder ? `${githubBaseFolder}/${currentFolder}` : githubBaseFolder;
        const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const filePath = `${folderPath}/${safeName}`;
        const apiUrl = `https://api.github.com/repos/${githubRepo}/contents/${filePath}`;
        
        const reader = new FileReader();
        return new Promise((resolve, reject) => {
            reader.onload = async function(e) {
                const base64Content = e.target.result.split(',')[1];
                let sha = null;
                try {
                    const checkRes = await fetch(apiUrl, {
                        headers: { 'Authorization': `token ${githubToken}` }
                    });
                    if (checkRes.ok) {
                        const existing = await checkRes.json();
                        sha = existing.sha;
                    }
                } catch(e) {}
                
                const body = {
                    message: sha ? `Update ${safeName}` : `Add ${safeName}`,
                    content: base64Content,
                    branch: githubBranch
                };
                if (sha) body.sha = sha;
                
                try {
                    const response = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    const rawUrl = `https://raw.githubusercontent.com/${githubRepo}/${githubBranch}/${filePath}`;
                    resolve({ success: true, url: rawUrl, name: safeName, path: filePath });
                } catch(err) {
                    reject(err);
                }
            };
            reader.onerror = () => reject(new Error('Failed to read file'));
            reader.readAsDataURL(file);
        });
    }
    
    async function createNewFolder(folderName) {
        if (!githubRepo || !githubToken) {
            showStatus("❌ Set GitHub repo and token first", true);
            return false;
        }
        saveSettings();
        
        const cleanName = folderName.replace(/[^a-zA-Z0-9_\-]/g, '_');
        const folderPath = currentFolder ? `${githubBaseFolder}/${currentFolder}/${cleanName}` : `${githubBaseFolder}/${cleanName}`;
        const apiUrl = `https://api.github.com/repos/${githubRepo}/contents/${folderPath}/.gitkeep`;
        
        try {
            const response = await fetch(apiUrl, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Create folder ${cleanName}`,
                    content: btoa(""),
                    branch: githubBranch
                })
            });
            if (response.ok) {
                showStatus(`✅ Folder "${cleanName}" created`);
                await scanEntireLibrary();
                return true;
            } else {
                throw new Error(`HTTP ${response.status}`);
            }
        } catch(err) {
            showStatus(`❌ Failed to create folder: ${err.message}`, true);
            return false;
        }
    }
    
    async function testConnection() {
        saveSettings();
        if (!githubRepo) {
            showStatus("Enter repo name", true);
            return;
        }
        try {
            const response = await fetch(`https://api.github.com/repos/${githubRepo}`, {
                headers: githubToken ? { 'Authorization': `token ${githubToken}` } : {}
            });
            if (response.ok) {
                showStatus(`✅ Connected to ${githubRepo}`);
            } else {
                showStatus(`❌ Repo not found (${response.status})`, true);
            }
        } catch(err) {
            showStatus(`❌ Connection failed`, true);
        }
    }
    
    // ========== FAVORITES ==========
    function toggleStar(songId, path) {
        const song = musicLibrary.find(s => s.id === songId);
        if (song) {
            song.starred = !song.starred;
            localStorage.setItem(`starred_${path}`, song.starred);
            savePlaylist();
            renderCurrentView();
            if (currentView === "favorites") renderCurrentView();
        }
    }
    
    // ========== RENDERING ==========
    function renderFolderBrowser() {
        const container = document.getElementById('folderBrowser');
        if (!container) return;
        
        const parts = currentFolder ? currentFolder.split('/') : [];
        let html = `<div style="display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px;">`;
        html += `<button class="nav-btn" data-folder="">📁 Root</button>`;
        let cumulativePath = "";
        for (let i = 0; i < parts.length; i++) {
            cumulativePath += (i > 0 ? "/" : "") + parts[i];
            html += `<span style="color:#888;">/</span>`;
            html += `<button class="nav-btn" data-folder="${cumulativePath}">📁 ${escapeHtml(parts[i])}</button>`;
        }
        html += `</div>`;
        
        // Show subfolders
        const subfolders = folders.filter(f => {
            if (!currentFolder) return !f.includes('/');
            return f.startsWith(currentFolder + '/') && f !== currentFolder && !f.slice(currentFolder.length+1).includes('/');
        });
        
        if (subfolders.length > 0) {
            html += `<div style="margin-top: 6px; padding: 4px; background: #252525; border-radius: 6px;">`;
            html += `<span style="font-size: 9px; color: #aaa;">📂 Subfolders:</span>`;
            for (let sub of subfolders) {
                const subName = sub.replace(currentFolder ? currentFolder + '/' : '', '');
                html += `<button class="nav-btn" data-folder="${sub}" style="margin-left: 8px;">📁 ${escapeHtml(subName)}</button>`;
            }
            html += `</div>`;
        }
        container.innerHTML = html;
        
        document.querySelectorAll('#folderBrowser .nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFolder = btn.dataset.folder || "";
                renderCurrentView();
            });
        });
    }
    
    function renderCurrentView() {
        renderFolderBrowser();
        document.getElementById('currentFolderDisplay').innerText = `📂 ${currentFolder || 'Music/'}`;
        
        let songsToShow = currentView === "favorites" ? musicLibrary.filter(s => s.starred) : musicLibrary;
        
        // Filter by current folder
        if (currentFolder) {
            songsToShow = songsToShow.filter(s => s.folder === currentFolder);
        } else {
            songsToShow = songsToShow.filter(s => !s.folder || !s.folder.includes('/'));
        }
        
        const container = document.getElementById('songList');
        if (songsToShow.length === 0) {
            container.innerHTML = `<div style="color:#666; text-align:center; padding:20px;">🎵 No songs in ${currentFolder || 'this folder'}</div>`;
            document.getElementById('songCount').innerText = musicLibrary.length + ' songs';
            return;
        }
        
        let html = '';
        songsToShow.forEach((song, idx) => {
            const isActive = (musicLibrary.indexOf(song) === currentIndex && currentView !== "favorites");
            html += `<div class="song-item ${isActive ? 'active' : ''}" data-id="${song.id}">
                <div class="song-info">
                    <span class="song-name">${escapeHtml(song.name)}</span>
                    ${song.artist ? `<span class="song-artist">${escapeHtml(song.artist)}</span>` : ''}
                </div>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button class="star-btn ${song.starred ? 'starred' : ''}" data-id="${song.id}" data-path="${song.path}">${song.starred ? '★' : '☆'}</button>
                    <button class="delete-song" data-id="${song.id}" data-path="${song.path}">🗑️</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        document.getElementById('songCount').innerText = musicLibrary.length + ' songs';
        
        // Attach click handlers
        document.querySelectorAll('.song-item').forEach(item => {
            item.addEventListener('click', (e) => {
                if (e.target.classList.contains('star-btn') || e.target.classList.contains('delete-song')) return;
                const id = parseInt(item.dataset.id);
                const songIndex = musicLibrary.findIndex(s => s.id === id);
                if (songIndex !== -1) playSongAtIndex(songIndex);
            });
        });
        
        document.querySelectorAll('.star-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const song = musicLibrary.find(s => s.id === id);
                if (song) toggleStar(id, song.path);
            });
        });
        
        document.querySelectorAll('.delete-song').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const path = btn.dataset.path;
                if (confirm('Delete this song from GitHub? This cannot be undone.')) {
                    await deleteFromGitHub(path);
                }
            });
        });
    }
    
    async function deleteFromGitHub(path) {
        if (!githubRepo || !githubToken) {
            showStatus("❌ GitHub token required", true);
            return;
        }
        
        const apiUrl = `https://api.github.com/repos/${githubRepo}/contents/${path}`;
        try {
            const getRes = await fetch(apiUrl, {
                headers: { 'Authorization': `token ${githubToken}` }
            });
            if (!getRes.ok) throw new Error('File not found');
            const fileData = await getRes.json();
            
            const deleteRes = await fetch(apiUrl, {
                method: 'DELETE',
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Delete ${path}`,
                    sha: fileData.sha,
                    branch: githubBranch
                })
            });
            
            if (deleteRes.ok) {
                showStatus(`✅ Deleted ${path.split('/').pop()}`);
                await scanEntireLibrary();
            } else {
                throw new Error(`HTTP ${deleteRes.status}`);
            }
        } catch(err) {
            showStatus(`❌ Delete failed: ${err.message}`, true);
        }
    }
    
    // ========== UPLOAD HANDLERS ==========
    async function uploadSingleFile(file) {
        if (!githubRepo || !githubToken) {
            showStatus("❌ Enter GitHub repo and token first", true);
            return;
        }
        showStatus(`📤 Uploading ${file.name}...`);
        try {
            const result = await uploadToCurrentFolder(file);
            if (result) {
                showStatus(`✅ Uploaded: ${result.name}`);
                await scanEntireLibrary();
            }
        } catch(err) {
            showStatus(`❌ Failed: ${err.message}`, true);
        }
    }
    
    async function uploadMultipleFiles(files) {
        if (!githubRepo || !githubToken) {
            showStatus("❌ Enter GitHub repo and token first", true);
            return;
        }
        let success = 0;
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            if (!file.type.startsWith('audio/')) continue;
            showStatus(`📤 ${i+1}/${files.length}: ${file.name}`);
            try {
                await uploadToCurrentFolder(file);
                success++;
                await new Promise(r => setTimeout(r, 500));
            } catch(err) { console.error(err); }
        }
        showStatus(`✅ Uploaded ${success} songs`);
        await scanEntireLibrary();
    }
    
    // ========== PLAYLIST SAVE/LOAD ==========
    function savePlaylist() {
        localStorage.setItem('walkman_playlist_v2', JSON.stringify(musicLibrary.map(s => ({
            id: s.id, name: s.name, artist: s.artist, url: s.url, path: s.path, folder: s.folder, starred: s.starred
        }))));
    }
    
    function loadPlaylist() {
        const saved = localStorage.getItem('walkman_playlist_v2');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                musicLibrary = parsed;
                // Restore starred status from localStorage if needed
                musicLibrary.forEach(s => {
                    const starred = localStorage.getItem(`starred_${s.path}`);
                    if (starred !== null) s.starred = starred === 'true';
                });
            } catch(e) {}
        }
        renderCurrentView();
    }
    
    // ========== PLAYER FUNCTIONS ==========
    function playSongAtIndex(idx) {
        if (idx < 0 || idx >= musicLibrary.length) return;
        currentIndex = idx;
        const song = musicLibrary[currentIndex];
        
        audio.pause();
        audio = new Audio(song.url);
        audio.volume = document.getElementById('volumeSlider').value / 100;
        audio.crossOrigin = "anonymous";
        
        document.getElementById('nowPlaying').innerText = song.name + (song.artist ? ` — ${song.artist}` : '');
        document.getElementById('cassetteLabel').innerHTML = `🎵 ${escapeHtml(song.name)}<br>${escapeHtml(song.artist || '')}`;
        
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', () => {
            if (audio.duration && isFinite(audio.duration)) {
                const m = Math.floor(audio.duration / 60);
                const s = Math.floor(audio.duration % 60);
                document.getElementById('totalTime').innerText = `${m}:${s.toString().padStart(2,'0')}`;
            }
        });
        audio.addEventListener('ended', () => {
            if (currentIndex + 1 < musicLibrary.length) playSongAtIndex(currentIndex + 1);
            else stopPlayback();
        });
        
        audio.play().then(() => {
            isPlaying = true;
            startReels();
        }).catch(e => {
            console.error('Play error:', e);
        });
        
        renderCurrentView();
    }
    
    function updateProgress() {
        if (audio.duration && isFinite(audio.duration)) {
            const percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            const m = Math.floor(audio.currentTime / 60);
            const s = Math.floor(audio.currentTime % 60);
            document.getElementById('currentTime').innerText = `${m}:${s.toString().padStart(2,'0')}`;
        }
    }
    
    function seekTo(e) {
        const rect = document.getElementById('progressBar').getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        if (audio.duration && isFinite(audio.duration)) audio.currentTime = percent * audio.duration;
    }
    
    function playCurrent() {
        if (musicLibrary.length === 0) { showStatus("No music", true); return; }
        if (audio.src) { audio.play(); isPlaying = true; startReels(); }
        else playSongAtIndex(currentIndex);
    }
    function pauseCurrent() { audio.pause(); isPlaying = false; stopReels(); }
    function stopPlayback() {
        audio.pause(); audio.currentTime = 0; isPlaying = false;
        document.getElementById('nowPlaying').innerText = 'STOPPED';
        document.getElementById('cassetteLabel').innerHTML = '🎵 No Tape';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('currentTime').innerText = '0:00';
        stopReels();
    }
    function nextSong() { if (musicLibrary.length) playSongAtIndex((currentIndex + 1) % musicLibrary.length); }
    function prevSong() { if (musicLibrary.length) playSongAtIndex((currentIndex - 1 + musicLibrary.length) % musicLibrary.length); }
    function startReels() {
        document.getElementById('reelLeft').classList.add('spinning');
        document.getElementById('reelRight').classList.add('spinning');
    }
    function stopReels() {
        document.getElementById('reelLeft').classList.remove('spinning');
        document.getElementById('reelRight').classList.remove('spinning');
    }
    function setVolume() { audio.volume = document.getElementById('volumeSlider').value / 100; }
    
    // ========== SYNC MODAL ==========
    function openSyncModal() { document.getElementById('syncModal').style.display = 'flex'; }
    function closeSyncModal() { document.getElementById('syncModal').style.display = 'none'; }
    
    // ========== EVENT LISTENERS ==========
    document.getElementById('playBtn').addEventListener('click', playCurrent);
    document.getElementById('pauseBtn').addEventListener('click', pauseCurrent);
    document.getElementById('stopBtn').addEventListener('click', stopPlayback);
    document.getElementById('nextBtn').addEventListener('click', nextSong);
    document.getElementById('prevBtn').addEventListener('click', prevSong);
    document.getElementById('volumeSlider').addEventListener('input', setVolume);
    document.getElementById('progressBar').addEventListener('click', seekTo);
    document.getElementById('testConnectionBtn').addEventListener('click', testConnection);
    document.getElementById('scanGithubBtn').addEventListener('click', scanEntireLibrary);
    document.getElementById('refreshBtn').addEventListener('click', scanEntireLibrary);
    document.getElementById('viewLibraryBtn').addEventListener('click', () => { currentView = "library"; renderCurrentView(); });
    document.getElementById('viewFavoritesBtn').addEventListener('click', () => { currentView = "favorites"; renderCurrentView(); });
    document.getElementById('createFolderBtn').addEventListener('click', () => {
        const folderName = prompt("New folder name:", "NewFolder");
        if (folderName) createNewFolder(folderName);
    });
    document.getElementById('syncStatusIndicator').addEventListener('click', openSyncModal);
    document.getElementById('closeSyncModal').addEventListener('click', closeSyncModal);
    
    document.getElementById('uploadFileInput').addEventListener('change', (e) => {
        if (e.target.files[0]) uploadSingleFile(e.target.files[0]);
        e.target.value = '';
    });
    document.getElementById('uploadMultiInput').addEventListener('change', (e) => {
        if (e.target.files.length) uploadMultipleFiles(e.target.files);
        e.target.value = '';
    });
    
    // Add sync modal
    if (!document.getElementById('syncModalContent')) {
        const syncModalHtml = `
        <div class="modal" id="syncModal">
            <div class="modal-content" id="syncModalContent">
                <div class="modal-title-bar" id="syncTitleBar"><span>☁️ Settings</span><span style="cursor:pointer" id="closeSyncModal2">✗</span></div>
                <div class="modal-body">
                    <p style="margin-bottom:10px;">Your music is stored in your GitHub repo. Playlist saves locally.</p>
                    <button id="exportPlaylistBtn" class="retro-button">💾 Export Playlist (JSON)</button>
                    <button id="clearStorageBtn" class="retro-button danger" style="margin-left:8px;">🗑️ Clear Local Data</button>
                </div>
            </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', syncModalHtml);
        document.getElementById('closeSyncModal2').onclick = closeSyncModal;
        document.getElementById('exportPlaylistBtn')?.addEventListener('click', () => {
            const data = JSON.stringify(musicLibrary, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `walkman_playlist_${new Date().toISOString().slice(0,19)}.json`;
            a.click();
        });
        document.getElementById('clearStorageBtn')?.addEventListener('click', () => {
            if (confirm('Clear local playlist cache? Your GitHub files remain safe.')) {
                localStorage.clear();
                location.reload();
            }
        });
    }
    
    function makeDraggable(popupId, handleId) {
        const popup = document.getElementById(popupId);
        const handle = document.getElementById(handleId);
        if (!popup || !handle) return;
        let pos1=0,pos2=0,pos3=0,pos4=0;
        handle.onmousedown = dragMouseDown;
        function dragMouseDown(e) { e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDrag; document.onmousemove = elementDrag; }
        function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; popup.style.top = (popup.offsetTop - pos2) + 'px'; popup.style.left = (popup.offsetLeft - pos1) + 'px'; popup.style.transform = 'none'; }
        function closeDrag() { document.onmouseup = null; document.onmousemove = null; }
    }
    makeDraggable('syncModal', 'syncTitleBar');
    
    // ========== INIT ==========
    loadPlaylist();
    if (githubRepo) scanEntireLibrary();
</script>
</body>
