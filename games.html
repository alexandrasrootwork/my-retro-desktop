
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Games Archive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #c0c0c0;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .title-bar {
            background: #000080;
            color: white;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            flex-shrink: 0;
        }
        
        .window-controls {
            display: flex;
            gap: 6px;
        }
        
        .window-controls span {
            cursor: pointer;
            padding: 0 4px;
        }
        
        .window-controls span:hover {
            background: #ff0000;
        }
        
        .toolbar {
            background: #dcdcdc;
            padding: 8px 12px;
            border-bottom: 1px solid #808080;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        
        .toolbar button {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 5px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        
        .toolbar button:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        .toolbar button.active {
            background: #000080;
            color: white;
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
        }
        
        .search-box input {
            padding: 4px 8px;
            border: 1px solid #808080;
            font-family: inherit;
        }
        
        .games-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }
        
        .game-card {
            background: #ffffff;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            text-align: center;
            cursor: pointer;
            padding: 15px 10px;
            transition: all 0.05s ease;
        }
        
        .game-card:hover {
            background: #000080;
            color: white;
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        .game-card:active {
            transform: translate(1px, 1px);
        }
        
        .game-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 10px;
        }
        
        .game-name {
            font-size: 11px;
            word-break: break-word;
        }
        
        .no-results {
            text-align: center;
            padding: 60px;
            color: #666;
            font-size: 14px;
        }
        
        .status-bar {
            background: #c0c0c0;
            border-top: 1px solid #fff;
            padding: 4px 8px;
            font-size: 11px;
            display: flex;
            gap: 20px;
            flex-shrink: 0;
        }
        
        ::-webkit-scrollbar {
            width: 16px;
            height: 16px;
        }
        
        ::-webkit-scrollbar-track {
            background: #c0c0c0;
            border: 1px solid #808080;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
        }
    </style>
</head>
<body>
    <div class="title-bar">
        <span>🎮 Games Archive</span>
        <div class="window-controls">
            <span id="closeBtn" style="cursor:pointer;">✗</span>
        </div>
    </div>
    
    <div class="toolbar">
        <button id="allGamesBtn" class="active">📋 All Games</button>
        <button id="classicBtn">🃏 Classic</button>
        <div class="search-box">
            🔍 <input type="text" id="searchInput" placeholder="Search games...">
        </div>
    </div>
    
    <div class="games-container">
        <div class="games-grid" id="gamesGrid"></div>
    </div>
    
    <div class="status-bar">
        <span id="gameCount">0 games</span>
        <span>🖱️ Click any game to play</span>
    </div>

    <script>
        const games = [
            { name: "Minesweeper", icon: "💣", category: "classic", file: "games/minesweeper.html", description: "Classic Minesweeper puzzle" },
            { name: "Snake", icon: "🐍", category: "classic", file: "games/snake.html", description: "Classic Snake game" },
            { name: "Tetris", icon: "🧩", category: "classic", file: "games/tetris.html", description: "Classic block stacking puzzle" },
            { name: "Solitaire", icon: "🃏", category: "classic", file: "games/solitaire.html", description: "Classic card game" },
            { name: "Pac-Man", icon: "👻", category: "classic", file: "games/pacman.html", description: "Classic maze chase game" }
        ];
        
        let currentCategory = "all";
        let searchTerm = "";
        
        function openGameInDesktop(gameFile, gameName) {
            // Try to call the parent window's function
            if (window.opener && typeof window.opener.openGameInDesktopWindow === 'function') {
                window.opener.openGameInDesktopWindow(gameFile, gameName);
            } 
            // If we're in an iframe, try parent
            else if (window.parent && window.parent !== window && typeof window.parent.openGameInDesktopWindow === 'function') {
                window.parent.openGameInDesktopWindow(gameFile, gameName);
            }
            // Fallback: open in new window using the desktop window function if available globally
            else if (typeof window.openGameInDesktopWindow === 'function') {
                window.openGameInDesktopWindow(gameFile, gameName);
            }
            // Last resort: open in new tab
            else {
                window.open(gameFile, '_blank');
            }
        }
        
        function renderGames() {
            const filtered = games.filter(game => {
                const matchesCategory = currentCategory === "all" || game.category === currentCategory;
                const matchesSearch = game.name.toLowerCase().includes(searchTerm) || 
                                      game.description.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesSearch;
            });
            
            const grid = document.getElementById('gamesGrid');
            const gameCountSpan = document.getElementById('gameCount');
            
            gameCountSpan.textContent = `${filtered.length} games`;
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results">🎮 No games found<br>Try a different category or search term</div>`;
                return;
            }
            
            grid.innerHTML = filtered.map(game => `
                <div class="game-card" data-file="${game.file}" data-name="${game.name}">
                    <span class="game-icon">${game.icon}</span>
                    <div class="game-name">${escapeHtml(game.name)}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const file = card.dataset.file;
                    const name = card.dataset.name;
                    openGameInDesktop(file, name);
                });
            });
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        document.getElementById('allGamesBtn').onclick = () => {
            currentCategory = "all";
            searchTerm = "";
            document.getElementById('searchInput').value = "";
            renderGames();
            updateActiveButton('allGamesBtn');
        };
        
        document.getElementById('classicBtn').onclick = () => {
            currentCategory = "classic";
            searchTerm = "";
            document.getElementById('searchInput').value = "";
            renderGames();
            updateActiveButton('classicBtn');
        };
        
        function updateActiveButton(activeId) {
            const buttons = ['allGamesBtn', 'classicBtn'];
            buttons.forEach(id => {
                const btn = document.getElementById(id);
                if (id === activeId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            currentCategory = "all";
            updateActiveButton('allGamesBtn');
            renderGames();
        });
        
        document.getElementById('closeBtn').onclick = () => {
            window.close();
        };
        
        let isDraggingMain = false;
        let offsetXMain, offsetYMain;
        const titleBar = document.querySelector('.title-bar');
        
        titleBar.addEventListener('mousedown', (e) => {
            if (e.target.id === 'closeBtn') return;
            isDraggingMain = true;
            offsetXMain = e.clientX - window.screenX;
            offsetYMain = e.clientY - window.screenY;
            titleBar.style.cursor = 'grabbing';
        });
        
        document.addEventListener('mousemove', (e) => {
            if (isDraggingMain) {
                window.moveTo(e.clientX - offsetXMain, e.clientY - offsetYMain);
            }
        });
        
        document.addEventListener('mouseup', () => {
            isDraggingMain = false;
            titleBar.style.cursor = '';
        });
        
        renderGames();
    </script>
</body>
</html>
