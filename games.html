<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💣 Minesweeper</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #c0c0c0;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            height: 100%;
        }
        
        .game-container {
            background: #c0c0c0;
            display: inline-block;
            padding: 0;
            margin: 0;
        }
        
        /* Mobile Controls Bar */
        .mobile-controls {
            display: none;
            margin-bottom: 4px;
            justify-content: center;
            gap: 8px;
        }
        
        .mode-btn {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 6px 12px;
            cursor: pointer;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .mode-btn.active {
            background: #000080;
            color: white;
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        .mode-btn:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        /* Show mobile controls on touch devices */
        @media (max-width: 768px), (pointer: coarse) {
            .mobile-controls {
                display: flex;
            }
        }
        
        .difficulty-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 2px;
            justify-content: center;
            background: #c0c0c0;
            padding: 2px;
            border: 1px solid #808080;
        }
        
        .difficulty-btn {
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 2px 8px;
            cursor: pointer;
            font-family: "MS Sans Serif", Tahoma, sans-serif;
            font-size: 11px;
            font-weight: bold;
        }
        
        .difficulty-btn:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        .difficulty-btn.active {
            background: #000080;
            color: white;
            border: 2px solid #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        .game-header {
            background: #c0c0c0;
            padding: 2px;
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #808080;
        }
        
        .mine-counter, .timer {
            background: #000;
            color: #f00;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            padding: 2px 4px;
            letter-spacing: 2px;
            min-width: 60px;
            text-align: center;
        }
        
        .smiley {
            background: #c0c0c0;
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            line-height: 1;
        }
        
        .smiley:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
        
        .board {
            display: grid;
            gap: 1px;
            background: #808080;
            padding: 2px;
            border: 2px solid #808080;
        }
        
        .cell {
            width: 30px;
            height: 30px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            text-align: center;
            line-height: 26px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .cell.revealed {
            background: #fff;
            border: 1px solid #808080;
            line-height: 28px;
        }
        
        .cell.flagged {
            position: relative;
        }
        
        .cell.flagged::before {
            content: "🚩";
            font-size: 16px;
        }
        
        .cell.value-1 { color: #0100f3; }
        .cell.value-2 { color: #367c21; }
        .cell.value-3 { color: #e93323; }
        .cell.value-4 { color: #020079; }
        .cell.value-5 { color: #78150e; }
        .cell.value-6 { color: #387e7e; }
        .cell.value-7 { color: #000000; }
        .cell.value-8 { color: #808080; }
        
        .status-bar {
            background: #c0c0c0;
            border-top: 1px solid #fff;
            padding: 2px 4px;
            font-size: 9px;
            margin-top: 2px;
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        
        .mobile-hint {
            display: none;
            font-size: 9px;
            color: #000;
        }
        
        @media (max-width: 768px), (pointer: coarse) {
            .mobile-hint {
                display: block;
            }
            .desktop-hint {
                display: none;
            }
        }
        
        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .game-message {
            background: #c0c0c0;
            border: 3px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 15px 25px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
        
        .game-message button {
            margin-top: 10px;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right-color: #000;
            border-bottom-color: #000;
            padding: 4px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
        }
        
        .game-message button:active {
            border: 2px solid #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- Mobile Controls -->
    <div class="mobile-controls">
        <button class="mode-btn" id="revealModeBtn">🔍 Reveal Mode</button>
        <button class="mode-btn" id="flagModeBtn">🚩 Flag Mode</button>
    </div>
    
    <div class="difficulty-bar">
        <button class="difficulty-btn" data-difficulty="easy">☺ Easy</button>
        <button class="difficulty-btn" data-difficulty="medium">😐 Medium</button>
        <button class="difficulty-btn" data-difficulty="hard">😮 Hard</button>
        <button class="difficulty-btn" data-difficulty="extreme">💀 Extreme</button>
    </div>
    
    <div class="game-header">
        <div class="mine-counter" id="mineCounter">000</div>
        <div class="smiley" id="smiley">🙂</div>
        <div class="timer" id="timer">000</div>
    </div>
    
    <div id="board" class="board"></div>
    
    <div class="status-bar">
        <span class="desktop-hint">💣 Left-click: Reveal | 🚩 Right-click: Flag</span>
        <span class="mobile-hint" id="mobileHint">🔍 Reveal Mode (tap cell to reveal)</span>
    </div>
</div>

<script>
    // Difficulty configurations
    const DIFFICULTIES = {
        easy: { width: 9, height: 9, mines: 10, name: 'Easy', cellSize: 30 },
        medium: { width: 16, height: 16, mines: 40, name: 'Medium', cellSize: 30 },
        hard: { width: 16, height: 30, mines: 99, name: 'Hard', cellSize: 30 },
        extreme: { width: 20, height: 30, mines: 160, name: 'Extreme', cellSize: 30 }
    };
    
    let currentDifficulty = 'easy';
    let board = [];
    let gameActive = true;
    let firstMove = true;
    let flagsPlaced = 0;
    let timer = 0;
    let timerInterval = null;
    let currentMines = 10;
    let currentWidth = 9;
    let currentHeight = 9;
    
    // Mobile mode: 'reveal' or 'flag'
    let mobileMode = 'reveal';
    
    function resizeParentWindow() {
        const config = DIFFICULTIES[currentDifficulty];
        const boardWidth = config.width * 30 + 8;
        const boardHeight = config.height * 30 + 8;
        const headerHeight = 42;
        const difficultyHeight = 30;
        const statusHeight = 22;
        const mobileControlsHeight = 35;
        const totalHeight = boardHeight + headerHeight + difficultyHeight + statusHeight + mobileControlsHeight + 4;
        const totalWidth = boardWidth + 8;
        
        if (window.parent && window.parent.resizeGameWindow) {
            window.parent.resizeGameWindow(totalWidth, totalHeight);
        }
    }
    
    function initGame() {
        if (timerInterval) clearInterval(timerInterval);
        timer = 0;
        updateTimer();
        gameActive = true;
        firstMove = true;
        flagsPlaced = 0;
        
        const config = DIFFICULTIES[currentDifficulty];
        currentMines = config.mines;
        currentWidth = config.width;
        currentHeight = config.height;
        
        updateMineCounter();
        document.getElementById('smiley').textContent = '🙂';
        
        board = Array(currentHeight).fill().map(() => Array(currentWidth).fill().map(() => ({
            revealed: false,
            mine: false,
            flagged: false,
            neighbor: 0
        })));
        
        render();
        resizeParentWindow();
    }
    
    function placeMines(firstX, firstY) {
        let placed = 0;
        while (placed < currentMines) {
            const x = Math.floor(Math.random() * currentWidth);
            const y = Math.floor(Math.random() * currentHeight);
            const isFirstCell = (x === firstX && y === firstY);
            const isAdjacent = Math.abs(x - firstX) <= 1 && Math.abs(y - firstY) <= 1;
            if (!board[y][x].mine && !isFirstCell && !isAdjacent) {
                board[y][x].mine = true;
                placed++;
            }
        }
        calculateNeighbors();
    }
    
    function calculateNeighbors() {
        for (let y = 0; y < currentHeight; y++) {
            for (let x = 0; x < currentWidth; x++) {
                if (!board[y][x].mine) {
                    board[y][x].neighbor = getNeighborMines(x, y);
                }
            }
        }
    }
    
    function getNeighborMines(x, y) {
        let count = 0;
        for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                const newX = x + i;
                const newY = y + j;
                if (newX >= 0 && newX < currentWidth && newY >= 0 && newY < currentHeight && board[newY][newX].mine) {
                    count++;
                }
            }
        }
        return count;
    }
    
    function reveal(x, y) {
        if (!gameActive || board[y][x].revealed || board[y][x].flagged) return;
        
        if (firstMove) {
            firstMove = false;
            placeMines(x, y);
            startTimer();
        }
        
        board[y][x].revealed = true;
        
        if (board[y][x].mine) {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('smiley').textContent = '💀';
            revealAllMines();
            render();
            showGameOverMessage('💥 GAME OVER! 💥');
            return;
        }
        
        if (board[y][x].neighbor === 0) {
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    const newX = x + i;
                    const newY = y + j;
                    if (newX >= 0 && newX < currentWidth && newY >= 0 && newY < currentHeight) {
                        reveal(newX, newY);
                    }
                }
            }
        }
        
        render();
        checkWin();
    }
    
    function revealAllMines() {
        for (let y = 0; y < currentHeight; y++) {
            for (let x = 0; x < currentWidth; x++) {
                if (board[y][x].mine) {
                    board[y][x].revealed = true;
                }
            }
        }
    }
    
    function toggleFlag(x, y) {
        if (!gameActive || board[y][x].revealed) return;
        
        if (!board[y][x].flagged && flagsPlaced < currentMines) {
            board[y][x].flagged = true;
            flagsPlaced++;
        } else if (board[y][x].flagged) {
            board[y][x].flagged = false;
            flagsPlaced--;
        }
        updateMineCounter();
        render();
        checkWin();
    }
    
    function checkWin() {
        let correctlyRevealed = 0;
        for (let y = 0; y < currentHeight; y++) {
            for (let x = 0; x < currentWidth; x++) {
                if (board[y][x].revealed && !board[y][x].mine) correctlyRevealed++;
            }
        }
        
        const totalSafeCells = currentWidth * currentHeight - currentMines;
        if (correctlyRevealed === totalSafeCells) {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('smiley').textContent = '😎';
            showWinMessage('🎉 YOU WIN! 🎉');
        }
    }
    
    function showGameOverMessage(msg) {
        const overlay = document.createElement('div');
        overlay.className = 'game-overlay';
        overlay.innerHTML = `
            <div class="game-message">
                ${msg}<br>
                <button onclick="location.reload()">New Game</button>
            </div>
        `;
        document.body.appendChild(overlay);
    }
    
    function showWinMessage(msg) {
        const overlay = document.createElement('div');
        overlay.className = 'game-overlay';
        overlay.innerHTML = `
            <div class="game-message">
                ${msg}<br>
                <button onclick="location.reload()">New Game</button>
            </div>
        `;
        document.body.appendChild(overlay);
    }
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameActive) {
                timer++;
                updateTimer();
            }
        }, 1000);
    }
    
    function updateMineCounter() {
        const remaining = currentMines - flagsPlaced;
        document.getElementById('mineCounter').textContent = String(remaining).padStart(3, '0');
    }
    
    function updateTimer() {
        document.getElementById('timer').textContent = String(timer).padStart(3, '0');
    }
    
    function handleCellInteraction(x, y) {
        if (mobileMode === 'reveal') {
            reveal(x, y);
        } else {
            toggleFlag(x, y);
        }
    }
    
    function render() {
        const container = document.getElementById('board');
        container.style.gridTemplateColumns = `repeat(${currentWidth}, 30px)`;
        container.innerHTML = '';
        
        for (let y = 0; y < currentHeight; y++) {
            for (let x = 0; x < currentWidth; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (board[y][x].revealed) {
                    cell.classList.add('revealed');
                    if (board[y][x].mine) {
                        cell.textContent = '💣';
                    } else if (board[y][x].neighbor > 0) {
                        cell.textContent = board[y][x].neighbor;
                        cell.classList.add(`value-${board[y][x].neighbor}`);
                    }
                } else if (board[y][x].flagged) {
                    cell.classList.add('flagged');
                }
                
                // Single tap/click handler for both desktop and mobile
                cell.onclick = (e) => {
                    e.preventDefault();
                    handleCellInteraction(x, y);
                };
                
                // Right-click for desktop users
                cell.oncontextmenu = (e) => {
                    e.preventDefault();
                    toggleFlag(x, y);
                    return false;
                };
                
                container.appendChild(cell);
            }
        }
    }
    
    function changeDifficulty(difficulty) {
        currentDifficulty = difficulty;
        
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            if (btn.dataset.difficulty === difficulty) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        initGame();
    }
    
    function setMobileMode(mode) {
        mobileMode = mode;
        const revealBtn = document.getElementById('revealModeBtn');
        const flagBtn = document.getElementById('flagModeBtn');
        const mobileHint = document.getElementById('mobileHint');
        
        if (mode === 'reveal') {
            revealBtn.classList.add('active');
            flagBtn.classList.remove('active');
            mobileHint.textContent = '🔍 Reveal Mode (tap cell to reveal)';
        } else {
            revealBtn.classList.remove('active');
            flagBtn.classList.add('active');
            mobileHint.textContent = '🚩 Flag Mode (tap cell to place/remove flag)';
        }
    }
    
    // Setup difficulty buttons
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            changeDifficulty(btn.dataset.difficulty);
        });
    });
    
    // Setup mobile mode buttons
    const revealModeBtn = document.getElementById('revealModeBtn');
    const flagModeBtn = document.getElementById('flagModeBtn');
    
    if (revealModeBtn && flagModeBtn) {
        revealModeBtn.addEventListener('click', () => setMobileMode('reveal'));
        flagModeBtn.addEventListener('click', () => setMobileMode('flag'));
        setMobileMode('reveal');
    }
    
    // Smiley reset button
    document.getElementById('smiley').onclick = () => {
        initGame();
    };
    
    // Set active initial button
    document.querySelector('.difficulty-btn[data-difficulty="easy"]').classList.add('active');
    
    // Start the game
    initGame();
</script>
</body>
</html>
