<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Health Tracker - Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Tahoma, sans-serif; background: #c0c0c0; padding: 20px; }
        .window { background: #c0c0c0; border: 3px solid #fff; border-right-color: #808080; border-bottom-color: #808080; max-width: 1000px; margin: 0 auto; }
        .title-bar { background: #000080; color: white; padding: 6px 10px; font-weight: bold; }
        .content { padding: 14px; background: #fffffa; }
        .tab-bar { display: flex; gap: 2px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab { background: #c0c0c0; border: 2px solid #fff; border-right-color: #808080; border-bottom-color: #808080; padding: 6px 16px; cursor: pointer; font-weight: bold; }
        .tab.active { background: #fffffa; border-bottom: 2px solid #fffffa; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .retro-button { background: #c0c0c0; border: 2px solid #fff; border-right-color: #000; border-bottom-color: #000; padding: 4px 12px; cursor: pointer; font-family: monospace; margin: 4px; }
        .workout-item { background: #e8e8e8; padding: 10px; margin: 8px 0; border-left: 4px solid #000080; display: flex; justify-content: space-between; align-items: center; }
        .note { background: #ffffcc; padding: 8px; margin: 12px 0; border-left: 4px solid #000080; font-size: 11px; }
        textarea { width: 100%; font-family: monospace; font-size: 11px; padding: 8px; margin: 8px 0; }
        hr { margin: 12px 0; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">🏥 Health & Mobility Tracker</div>
    <div class="content">
        <div class="tab-bar">
            <div class="tab active" data-tab="library">📚 Library</div>
            <div class="tab" data-tab="test">✅ Test Tab</div>
        </div>

        <!-- LIBRARY TAB -->
        <div id="libraryTab" class="tab-pane active">
            <div class="note">
                <strong>📚 Workout Library</strong><br>
                Click <strong>Edit</strong> on any workout → one textarea appears. Edit the text, then Save.
            </div>
            
            <textarea id="importTextarea" rows="4" style="width:100%" placeholder="[My Morning Routine]
- Ankle pumps: 2 min
- Heel slides: 3 min

[Evening Routine]
- Leg lifts: 3x10
- Glute bridges: 3x8"></textarea>
            
            <button id="importBtn" class="retro-button">🚀 Import to Library</button>
            <button id="previewBtn" class="retro-button">👁️ Preview</button>
            <button id="newWorkoutBtn" class="retro-button">➕ New Empty Workout</button>
            
            <div id="previewArea" style="background:#e8e8e8; padding:8px; margin:12px 0; display:none; font-size:11px;"></div>
            
            <hr>
            <div><strong>Your Workouts:</strong></div>
            <div id="libraryList" style="margin-top: 8px;"></div>
            
            <!-- EDIT PANEL (hidden until needed) -->
            <div id="editPanel" style="display:none; margin-top: 20px; border-top: 2px solid #808080; padding-top: 12px;">
                <strong>✏️ Editing: <span id="editWorkoutName"></span></strong>
                <textarea id="editTextarea" rows="10" style="width:100%; margin: 8px 0;"></textarea>
                <button id="saveEditBtn" class="retro-button">💾 Save Changes</button>
                <button id="cancelEditBtn" class="retro-button">❌ Cancel</button>
            </div>
        </div>

        <!-- TEST TAB (to verify page loads) -->
        <div id="testTab" class="tab-pane">
            <div class="note">✅ Page is working! If you see this, the tracker is functional.</div>
            <p>Click "Library" tab above to go back.</p>
        </div>
    </div>
</div>

<script>
    // Simple data store
    let workoutLibrary = [];
    
    // Load from localStorage
    function loadData() {
        let saved = localStorage.getItem('simple_library');
        if (saved) {
            workoutLibrary = JSON.parse(saved);
        }
        if (workoutLibrary.length === 0) {
            workoutLibrary = [
                { id: "1", name: "Evening Routine", exercises: [
                    { id: "e1", name: "Ankle pumps", reps: "2 min", videoUrl: "", description: "" },
                    { id: "e2", name: "Leg lifts", reps: "3 min", videoUrl: "", description: "" }
                ]}
            ];
        }
        renderLibrary();
    }
    
    function saveData() {
        localStorage.setItem('simple_library', JSON.stringify(workoutLibrary));
    }
    
    // Convert workout to text for editing
    function workoutToText(workout) {
        let lines = [`[${workout.name}]`];
        for (let ex of workout.exercises) {
            lines.push(`- ${ex.name}: ${ex.reps}`);
        }
        return lines.join('\n');
    }
    
    // Parse text back to exercises
    function textToExercises(workoutName, text) {
        let lines = text.split(/\r?\n/);
        let exercises = [];
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('-')) {
                let exText = line.substring(1).trim();
                let colonIdx = exText.indexOf(':');
                let exName = colonIdx !== -1 ? exText.substring(0, colonIdx).trim() : exText;
                let reps = colonIdx !== -1 ? exText.substring(colonIdx + 1).trim() : '1 set';
                exercises.push({
                    id: Date.now() + '_' + Math.random(),
                    name: exName,
                    reps: reps,
                    videoUrl: "",
                    description: ""
                });
            }
        }
        return exercises;
    }
    
    function renderLibrary() {
        let container = document.getElementById('libraryList');
        if (!container) return;
        if (workoutLibrary.length === 0) {
            container.innerHTML = '<div class="note">No workouts. Import or create one.</div>';
            return;
        }
        
        let html = '';
        for (let i = 0; i < workoutLibrary.length; i++) {
            let w = workoutLibrary[i];
            html += `<div class="workout-item">
                <div><strong>📌 ${escapeHtml(w.name)}</strong> (${w.exercises.length} exercises)</div>
                <div>
                    <button class="edit-btn" data-id="${w.id}">✏️ Edit</button>
                    <button class="delete-btn" data-id="${w.id}" style="background:#800000; color:white;">🗑️ Delete</button>
                </div>
            </div>`;
        }
        container.innerHTML = html;
        
        // Attach edit buttons
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let id = btn.dataset.id;
                let workout = workoutLibrary.find(w => w.id === id);
                if (workout) openEditPanel(workout);
            });
        });
        
        // Attach delete buttons
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let id = btn.dataset.id;
                let workout = workoutLibrary.find(w => w.id === id);
                if (confirm(`Delete "${workout?.name}"?`)) {
                    workoutLibrary = workoutLibrary.filter(w => w.id !== id);
                    saveData();
                    renderLibrary();
                }
            });
        });
    }
    
    let currentEditWorkout = null;
    
    function openEditPanel(workout) {
        currentEditWorkout = workout;
        let text = workoutToText(workout);
        document.getElementById('editTextarea').value = text;
        document.getElementById('editWorkoutName').innerText = workout.name;
        document.getElementById('editPanel').style.display = 'block';
        document.getElementById('editPanel').scrollIntoView({ behavior: 'smooth' });
    }
    
    function closeEditPanel() {
        document.getElementById('editPanel').style.display = 'none';
        currentEditWorkout = null;
    }
    
    function saveEdit() {
        if (!currentEditWorkout) return;
        let newText = document.getElementById('editTextarea').value;
        let newExercises = textToExercises(currentEditWorkout.name, newText);
        
        if (newExercises.length === 0) {
            alert("No valid exercises found. Use format:\n- Exercise name: reps");
            return;
        }
        
        currentEditWorkout.exercises = newExercises;
        saveData();
        renderLibrary();
        closeEditPanel();
        alert(`✅ "${currentEditWorkout.name}" saved`);
    }
    
    function importWorkouts() {
        let text = document.getElementById('importTextarea').value;
        let lines = text.split(/\r?\n/);
        let newWorkouts = [];
        let current = null;
        
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('[') && line.endsWith(']')) {
                if (current) newWorkouts.push(current);
                let name = line.slice(1, -1);
                current = { id: Date.now() + '_' + Math.random(), name: name, exercises: [] };
            } else if (line.startsWith('-') && current) {
                let exText = line.substring(1).trim();
                let colonIdx = exText.indexOf(':');
                let exName = colonIdx !== -1 ? exText.substring(0, colonIdx).trim() : exText;
                let reps = colonIdx !== -1 ? exText.substring(colonIdx + 1).trim() : '1 set';
                current.exercises.push({
                    id: Date.now() + '_' + Math.random(),
                    name: exName,
                    reps: reps,
                    videoUrl: "",
                    description: ""
                });
            }
        }
        if (current) newWorkouts.push(current);
        
        if (newWorkouts.length === 0) {
            alert("No valid workouts. Use [Name] and - exercise lines.");
            return;
        }
        
        workoutLibrary.push(...newWorkouts);
        saveData();
        renderLibrary();
        document.getElementById('importTextarea').value = '';
        document.getElementById('previewArea').style.display = 'none';
        alert(`Imported ${newWorkouts.length} workouts.`);
    }
    
    function previewImport() {
        let text = document.getElementById('importTextarea').value;
        let lines = text.split(/\r?\n/);
        let newWorkouts = [];
        let current = null;
        
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('[') && line.endsWith(']')) {
                if (current) newWorkouts.push(current);
                let name = line.slice(1, -1);
                current = { name: name, exercises: [] };
            } else if (line.startsWith('-') && current) {
                current.exercises.push({ name: line.substring(1).trim() });
            }
        }
        if (current) newWorkouts.push(current);
        
        let previewDiv = document.getElementById('previewArea');
        if (newWorkouts.length === 0) {
            previewDiv.style.display = 'block';
            previewDiv.innerHTML = '<span style="color:#800000;">No workouts found</span>';
        } else {
            previewDiv.style.display = 'block';
            let html = '<strong>Preview:</strong><br>';
            for (let w of newWorkouts) {
                html += `<div><b>${escapeHtml(w.name)}</b> (${w.exercises.length} exercises)</div>`;
            }
            previewDiv.innerHTML = html;
        }
    }
    
    function newEmptyWorkout() {
        let name = prompt("Workout name:", "My Workout");
        if (!name) return;
        let newWorkout = {
            id: Date.now() + '_' + Math.random(),
            name: name,
            exercises: [{ id: Date.now() + '_ex', name: "Example exercise", reps: "3x10", videoUrl: "", description: "" }]
        };
        workoutLibrary.push(newWorkout);
        saveData();
        renderLibrary();
        openEditPanel(newWorkout);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function switchTab(tabId) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId + 'Tab').classList.add('active');
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
    }
    
    // Initialize
    loadData();
    
    document.getElementById('importBtn').addEventListener('click', importWorkouts);
    document.getElementById('previewBtn').addEventListener('click', previewImport);
    document.getElementById('newWorkoutBtn').addEventListener('click', newEmptyWorkout);
    document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
    document.getElementById('cancelEditBtn').addEventListener('click', closeEditPanel);
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
</script>
</body>
</html>
